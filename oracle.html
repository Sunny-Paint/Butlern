<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Oracle">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1238">
<title>Oracle</title>

<style>
:root{
  --bg-grad:linear-gradient(180deg,#0f0a24 0%,#1a1238 50%,#2a1a4a 100%);
  --card:#1f1640;
  --card-soft:#2a1f55;
  --ink:#f0eaff;
  --muted:#a89cd0;
  --line:#3d2e6e;
  --gold:#e8c674;
  --gold-dark:#c9a850;
  --accent-soft:#3d2e6e;
  --shadow:0 4px 20px rgba(0,0,0,.35);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg-grad);background-attachment:fixed;
  color:var(--ink);line-height:1.5;
  padding:24px 16px 60px;min-height:100vh;
}
.wrap{max-width:720px;margin:0 auto}
h1{margin:0 0 4px;font-size:30px;font-weight:600;letter-spacing:0.02em;text-align:center}
.subtitle{margin:0 0 22px;color:var(--muted);font-size:14px;text-align:center}
.subtitle a{color:var(--gold);text-decoration:none}
.subtitle a:hover{text-decoration:underline}

.section{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px 20px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.section h2{margin:0 0 12px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);text-align:center}

.spreads{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.spread-btn{
  background:var(--card-soft);color:var(--ink);
  border:1px solid var(--line);border-radius:10px;
  padding:10px 14px;font-family:inherit;font-size:13px;cursor:pointer;
  transition:all .15s;
}
.spread-btn:hover{border-color:var(--gold);color:var(--gold)}
.spread-btn.active{background:var(--gold);color:#1a1238;border-color:var(--gold);font-weight:600}

.draw-area{text-align:center}
.draw-btn{
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:#1a1238;border:none;border-radius:14px;
  padding:16px 36px;font-family:inherit;font-size:16px;font-weight:600;
  letter-spacing:0.05em;cursor:pointer;
  box-shadow:0 4px 16px rgba(232,198,116,.25);
  transition:transform .15s, box-shadow .15s;
}
.draw-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(232,198,116,.4)}
.draw-btn:active{transform:translateY(0)}
.draw-btn:disabled{opacity:.5;cursor:not-allowed}

.spread-info{font-size:13px;color:var(--muted);margin:10px 0 0;font-style:italic}

.cards-grid{
  display:grid;gap:14px;margin-top:18px;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
}
.cards-grid.celtic{
  grid-template-columns:repeat(4,1fr);
  max-width:560px;margin-left:auto;margin-right:auto;
}
.tcard{
  background:linear-gradient(135deg,#2a1f55,#1a1238);
  border:1px solid var(--gold);border-radius:12px;
  padding:14px 10px;text-align:center;
  min-height:170px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;
  opacity:0;transform:translateY(10px);
  animation:cardIn .5s ease-out forwards;
  box-shadow:0 4px 14px rgba(0,0,0,.35), inset 0 0 20px rgba(232,198,116,.08);
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.tcard .pos{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);margin-bottom:8px}
.tcard .glyph{font-size:34px;line-height:1;margin:6px 0}
.tcard .name{font-size:14px;font-weight:600;margin:6px 0 4px;color:var(--ink)}
.tcard .kw{font-size:11px;color:var(--muted);font-style:italic;line-height:1.3}

.reading{
  background:linear-gradient(180deg,rgba(232,198,116,.05),transparent);
  border:1px solid var(--gold);border-radius:12px;
  padding:18px 20px;margin-top:18px;
  font-size:14px;line-height:1.7;
}
.reading p{margin:0 0 12px}
.reading p:last-child{margin-bottom:0}
.reading b{color:var(--gold);font-weight:600}
.reading em{color:var(--muted);font-style:italic}
.reading .opener{font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;text-align:center}
.reading .closer{font-size:13px;color:var(--muted);font-style:italic;text-align:center;margin-top:14px}

.empty{text-align:center;color:var(--muted);font-style:italic;padding:30px 10px}

@media (max-width:720px){
  body{padding:14px 10px 60px}
  h1{font-size:24px}
  .section{padding:14px}
  .cards-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .cards-grid.celtic{grid-template-columns:repeat(2,1fr)}
  .tcard{min-height:150px;padding:10px 6px}
  .tcard .glyph{font-size:28px}
  .tcard .name{font-size:13px}
}
</style>
</head>
<body>

<div class="wrap">

<h1>🔮 Oracle</h1>
<p class="subtitle"><a href="butlern.html">← Butlern</a></p>

<div class="section">
  <h2>Välj läggning</h2>
  <div class="spreads" id="spreads"></div>
  <p class="spread-info" id="spreadInfo"></p>
</div>

<div class="section draw-area">
  <button class="draw-btn" id="drawBtn">✨ Dra kort ✨</button>
</div>

<div id="result"></div>

</div>

<script>
/* ============================================================
   DECK — Rider-Waite-Smith, 78 kort, nyckelord på svenska
   ============================================================ */
const MAJOR = [
  { n:"Dåren",                glyph:"🌀", kw:["nya början","oskuld","språng i mörker","tro"],
    msg:"Du står på klippkanten med uppspilade ögon. Språnget i det okända kallar — våga lita på flödet utan att veta vart det bär." },
  { n:"Magikern",             glyph:"🪄", kw:["vilja","skapande","manifestation","handling"],
    msg:"Allt du behöver ligger framför dig på bordet. Det är dags att samla viljan och skapa det du burit som dröm." },
  { n:"Översteprästinnan",    glyph:"🌙", kw:["intuition","mysterium","tystnad","det dolda"],
    msg:"Sänk rösten och lyssna inåt. Svaret du söker viskar i tystnaden, inte i orden." },
  { n:"Kejsarinnan",          glyph:"🌹", kw:["fertilitet","mjukhet","överflöd","moder"],
    msg:"Något inom dig vill växa — låt det. Mjukhet, fertilitet och omsorg är din väg just nu." },
  { n:"Kejsaren",             glyph:"♛", kw:["struktur","auktoritet","trygghet","gränser"],
    msg:"Bygg ramen, sätt gränser, ta plats. Strukturen är inte ofrihet — den är det som låter livet bli stadigt." },
  { n:"Översteprästen",       glyph:"🗝️", kw:["tradition","vägledning","lärdom","tro"],
    msg:"Sök vägledning hos något äldre än dig själv — en lärare, en tradition, en inre kompass." },
  { n:"De Älskande",          glyph:"💞", kw:["kärlek","val","förening","sanning"],
    msg:"Ett val står framför dig som rör hjärtat. Välj det som är sant, inte det som är bekvämt." },
  { n:"Vagnen",               glyph:"🏇", kw:["framdrift","seger","viljekraft","riktning"],
    msg:"Tygla dina krafter och rikta dem mot ett mål. Segern är möjlig om du håller fokus." },
  { n:"Styrkan",              glyph:"🦁", kw:["mod","sakta lugn","inre kraft","mildhet"],
    msg:"Den verkliga kraften ligger i mildheten. Möt det vilda inom dig med tålamod, inte med våld." },
  { n:"Eremiten",             glyph:"🕯️", kw:["inåtvändhet","sökande","ensam visdom","ljus"],
    msg:"Dra dig undan en stund. Det inre ljuset behöver tystnad för att lysa klart." },
  { n:"Lyckohjulet",          glyph:"☸️", kw:["öde","vändpunkt","cykler","flöde"],
    msg:"Hjulet vrider sig — det du inte styr över är i rörelse. Lita på cykeln." },
  { n:"Rättvisan",            glyph:"⚖️", kw:["sanning","balans","konsekvens","klarhet"],
    msg:"Sanningen vägs nu. Det du sått återvänder, varken mer eller mindre." },
  { n:"Den Hängde",           glyph:"🙃", kw:["pause","nytt perspektiv","överlåtelse","väntan"],
    msg:"Pausa. Vänd allt upp och ner och se vad som visar sig från en ny vinkel." },
  { n:"Döden",                glyph:"💀", kw:["slut","förvandling","släppa","nyfödd"],
    msg:"Något måste sluta för att något annat ska kunna börja. Släpp det som inte längre är ditt." },
  { n:"Måttlighet",           glyph:"🌗", kw:["balans","blandning","tålamod","alkemi"],
    msg:"Blanda långsamt och tålmodigt. Det är i mellanrummet, i flödet mellan motsatser, som magin sker." },
  { n:"Djävulen",             glyph:"🪤", kw:["bindning","skugga","begär","illusion"],
    msg:"Vad binder dig? Kedjan du bär är ofta lösare än du tror — du behöver bara våga se den." },
  { n:"Tornet",               glyph:"⚡", kw:["omvälvning","sanning bryter fram","frigörelse","chock"],
    msg:"Något raseras med ett blixtnedslag. Det som faller var aldrig sant — och därför är fallet en gåva." },
  { n:"Stjärnan",             glyph:"⭐", kw:["hopp","läkning","ny tro","klarhet"],
    msg:"Efter mörkret kommer hopp. Drick av den klara källan, du läks." },
  { n:"Månen",                glyph:"🌖", kw:["drömmar","osäkerhet","det undermedvetna","mysterium"],
    msg:"Inget är som det ser ut. Det undermedvetna talar i drömmar och oro — gå försiktigt och lyssna." },
  { n:"Solen",                glyph:"☀️", kw:["glädje","framgång","klarhet","värme"],
    msg:"Allt klarnar. Värme, glädje och enkelhet vill möta dig — släpp in den." },
  { n:"Domen",                glyph:"📯", kw:["uppvaknande","kall","befrielse","återfödelse"],
    msg:"Ett kall ljuder. Något i dig vaknar och får inte längre sova — svara." },
  { n:"Världen",              glyph:"🌍", kw:["fullbordan","helhet","framgång","cirkel sluten"],
    msg:"Cirkeln är sluten, fullbordan är nådd. Andas in det och låt en ny cykel börja." }
];

const SUITS = [
  { name:"Stavar",  el:"eld",     glyph:"🔥", themes:["passion","skapande","handling","viljan"] },
  { name:"Bägare",  el:"vatten",  glyph:"💧", themes:["känslor","kärlek","relationer","intuition"] },
  { name:"Svärd",   el:"luft",    glyph:"⚔️", themes:["tankar","sanning","konflikt","beslut"] },
  { name:"Mynt",    el:"jord",    glyph:"🌿", themes:["kropp","arbete","pengar","det jordiska"] }
];

const NUMBER_KW = {
  1:  ["fröet","gnistan","ny möjlighet","första impulsen"],
  2:  ["balans","val","möte","spegling"],
  3:  ["växt","skapelse","tre samverkar","första frukten"],
  4:  ["stabilitet","grund","vila","befästning"],
  5:  ["utmaning","kris","brytning","prövning"],
  6:  ["harmoni","gåva","minne","flöde"],
  7:  ["reflektion","mysterium","val","prövning av tron"],
  8:  ["rörelse","mästerskap","fokus","ihärdighet"],
  9:  ["fullbordan nära","integration","mognad","ensam styrka"],
  10: ["fullbordan","cykel sluten","tyngd eller överflöd","slut+början"]
};

const NUMBER_MSG = {
  1:  "Fröet planteras — något nytt vill födas",
  2:  "Två krafter möts — balans eller spänning söker sin form",
  3:  "Det första uttrycket — något börjar bära frukt",
  4:  "Grunden vilar stadigt — strukturen är lagd",
  5:  "Förändring rycker — det säkra skakar och prövas",
  6:  "Harmoni återvänder — ett flöde av gåvor och minnen",
  7:  "Reflektionens tid — tron och visionen prövas",
  8:  "Rörelsen accelererar — mästerskap formas genom fokus",
  9:  "Fullbordan närmar sig — mognad inom räckhåll",
  10: "Cirkeln sluts — ett slut och en ny början möts"
};

const COURT_KW = {
  "Page":     ["budbärare","ungt mod","lärande","oskuld"],
  "Riddare":  ["aktion","strävan","ihärdighet","resa"],
  "Drottning":["mognad","omsorg","mästerskap","inre styrka"],
  "Kung":     ["auktoritet","behärskning","ledarskap","fullkomning"]
};

const COURT_MSG = {
  "Page":     "En ung budbärare — något nyfiket och oskuldsfullt rör sig",
  "Riddare":  "En kraft i rörelse — det handlar, söker och strävar framåt",
  "Drottning":"Den mogna kraften — närvaro, omsorg och inre mästerskap",
  "Kung":     "Fullkomnandet — auktoritet, ansvar och behärskning"
};

const SUIT_DOMAIN = {
  "Stavar": "i din skapande gnista, i passionens och viljans rike",
  "Bägare": "i hjärtats vatten, i känslans och relationens flöde",
  "Svärd":  "i tankens vassa luft, i sanningens och beslutens rike",
  "Mynt":   "i kroppens och det jordiskas mark, i det materiellas grund"
};

function buildDeck() {
  const deck = MAJOR.slice();
  SUITS.forEach(suit => {
    for (let n=1; n<=10; n++) {
      const name = (n===1?"Ess":n) + " av " + suit.name;
      const kw = NUMBER_KW[n].slice(0,2).concat(suit.themes.slice(0,2));
      const msg = NUMBER_MSG[n] + " " + SUIT_DOMAIN[suit.name] + ".";
      deck.push({ n:name, glyph:suit.glyph, kw, msg });
    }
    ["Page","Riddare","Drottning","Kung"].forEach(rank => {
      const name = rank + " av " + suit.name;
      const kw = COURT_KW[rank].slice(0,2).concat(suit.themes.slice(0,2));
      const msg = COURT_MSG[rank] + " " + SUIT_DOMAIN[suit.name] + ".";
      deck.push({ n:name, glyph:suit.glyph, kw, msg });
    });
  });
  return deck;
}
const DECK = buildDeck();  // 78 kort

/* ============================================================
   SPREADS
   ============================================================ */
const SPREADS = [
  {
    id:"daily", name:"Ett kort", info:"Ett kort — det som söker din uppmärksamhet just nu.",
    positions:["Ett kort"]
  },
  {
    id:"yesno", name:"Ja / Nej", info:"Ett kort. Drag ett kort med ditt jadagsfrågande i tanken.",
    positions:["Svaret"], yesno:true
  },
  {
    id:"past", name:"Dåtid · Nutid · Framtid", info:"Tre kort — flödet genom tiden.",
    positions:["Dåtid","Nutid","Framtid"]
  },
  {
    id:"mind", name:"Sinne · Kropp · Själ", info:"Tre kort — det som rör sig på dina tre nivåer.",
    positions:["Sinne","Kropp","Själ"]
  },
  {
    id:"sit", name:"Situation · Utmaning · Råd", info:"Tre kort — för en specifik fråga.",
    positions:["Situation","Utmaning","Råd"]
  },
  {
    id:"celtic", name:"Keltiskt kors", info:"Tio kort — den djupa läggningen.",
    positions:["Nuet","Korsande utmaning","Grunden","Det förflutna","Mål","Framtid nära","Du själv","Omgivning","Hopp & rädsla","Resultat"],
    celtic:true
  }
];

/* ============================================================
   MEDIUM-RÖST — öppningar och uttryck per position
   ============================================================ */
const OPENERS = [
  "Anden lyssnar… korten har vänts.",
  "Slöjan dras åt sidan. Detta ser jag.",
  "Tystnaden talar — så här viskar korten.",
  "Jag känner energierna stilla sig. Detta uppenbarar sig.",
  "Andetagen blir djupa. Korten talar nu."
];
const CLOSERS = [
  "Lita på det som rör sig inom dig. Korten har sagt sitt.",
  "Bär detta med dig i tystnad en stund.",
  "Det viktigaste är vad du känner när du läser detta igen.",
  "Korten är bara speglar — du är seendet."
];
const POS_PHRASES = {
  "Ett kort":        ["Korten visar", "Det som vill möta dig är", "Anden lägger fram"],
  "Svaret":          ["Korten viskar", "Svaret som flyter upp är", "Det jag hör är"],
  "Dåtid":           ["I dåtid lägger sig", "Bakom dig vilar", "Det förflutna bär"],
  "Nutid":           ["I nuet uppenbarar sig", "Just nu står", "I detta ögonblick rör sig"],
  "Framtid":         ["Framåt ser jag", "Det som kommer är", "I framtiden formar sig"],
  "Sinne":           ["I ditt sinne pulserar", "Tankarna bär", "Mentalt rör sig"],
  "Kropp":           ["I din kropp vilar", "Kroppen viskar om", "Det fysiska bär"],
  "Själ":            ["Själen kallar på", "Djupast inne lyser", "I anden vilar"],
  "Situation":       ["Situationen bär", "Här ser jag", "Det som är i centrum är"],
  "Utmaning":        ["Utmaningen som korsar är", "Det som testar dig är", "Hindret är"],
  "Råd":             ["Korten råder", "Vägen framåt är", "Anden viskar"],
  "Nuet":            ["I centrum vilar", "Just nu står", "Här och nu rör sig"],
  "Korsande utmaning":["Det som korsar dig är", "Spänningen ligger i", "Motkraften är"],
  "Grunden":         ["Grunden är", "Under allt vilar", "Roten är"],
  "Det förflutna":   ["Bakom dig finns", "Det som varit är", "Från det förflutna ekar"],
  "Mål":             ["Det möjliga målet är", "Ovanför svävar", "Drömmen pekar mot"],
  "Framtid nära":    ["Snart anländer", "Strax framöver visar sig", "Det nära kommande är"],
  "Du själv":        ["Du själv just nu är", "I dig vibrerar", "Ditt nu är"],
  "Omgivning":       ["Omkring dig finns", "Andra människor bär", "Världen runt dig är"],
  "Hopp & rädsla":   ["I ditt hopp och din rädsla bor", "Inom dig brinner", "Det du både önskar och fruktar är"],
  "Resultat":        ["Slutligen formar sig", "Som ändpunkt visar sig", "Det som blir är"]
};

/* ============================================================
   STATE + RENDER
   ============================================================ */
let currentSpread = SPREADS[0];

const spreadsEl = document.getElementById("spreads");
const spreadInfoEl = document.getElementById("spreadInfo");
const drawBtn = document.getElementById("drawBtn");
const resultEl = document.getElementById("result");

SPREADS.forEach((s, i) => {
  const b = document.createElement("button");
  b.className = "spread-btn" + (i===0 ? " active" : "");
  b.textContent = s.name;
  b.dataset.id = s.id;
  b.addEventListener("click", () => {
    currentSpread = s;
    document.querySelectorAll(".spread-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    spreadInfoEl.textContent = s.info;
  });
  spreadsEl.appendChild(b);
});
spreadInfoEl.textContent = currentSpread.info;

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function drawCards(n) {
  const idx = new Set();
  while (idx.size < n) idx.add(Math.floor(Math.random()*DECK.length));
  return [...idx].map(i => DECK[i]);
}

function makeYesNo(card) {
  // Använd kortets keywords för att avgöra ton; randomisera lätt
  const positives = ["solen","stjärnan","världen","kejsarinnan","de älskande","styrkan","måttlighet","magikern","domen"];
  const negatives = ["tornet","döden","djävulen","månen","den hängde","eremiten"];
  const name = card.n.toLowerCase();
  if (positives.some(p => name.includes(p))) return "✨ Ja";
  if (negatives.some(p => name.includes(p))) return "⚠️ Nej — eller inte just nu";
  // Annars baserat på första nyckelordet
  return Math.random() < 0.55 ? "🌒 Kanske — lyssna inåt" : "🌓 Tveksamt";
}

function buildReading(spread, cards) {
  const lines = [];
  lines.push(`<p class="opener">${pick(OPENERS)}</p>`);
  spread.positions.forEach((pos, i) => {
    const c = cards[i];
    const phrase = pick(POS_PHRASES[pos] || ["Här lägger sig"]);
    const kw = c.kw.slice(0,3).join(", ");
    lines.push(`<p>${phrase} <b>${c.n}</b> — <em>${kw}</em>.<br>${c.msg || ""}</p>`);
  });
  if (spread.yesno) {
    lines.push(`<p style="text-align:center;font-size:18px;margin-top:14px"><b>${makeYesNo(cards[0])}</b></p>`);
  }
  lines.push(`<p class="closer">${pick(CLOSERS)}</p>`);
  return lines.join("");
}

function renderCards(spread, cards) {
  const gridClass = spread.celtic ? "cards-grid celtic" : "cards-grid";
  let html = `<div class="section"><h2>${spread.name}</h2><div class="${gridClass}">`;
  spread.positions.forEach((pos, i) => {
    const c = cards[i];
    html += `
      <div class="tcard" style="animation-delay:${i*120}ms">
        <div class="pos">${pos}</div>
        <div class="glyph">${c.glyph}</div>
        <div>
          <div class="name">${c.n}</div>
          <div class="kw">${c.kw.slice(0,2).join(" · ")}</div>
        </div>
      </div>`;
  });
  html += `</div></div>`;
  html += `<div class="section"><h2>Tolkning</h2><div class="reading">${buildReading(spread, cards)}</div></div>`;
  resultEl.innerHTML = html;
  resultEl.scrollIntoView({ behavior:"smooth", block:"start" });
}

drawBtn.addEventListener("click", () => {
  const cards = drawCards(currentSpread.positions.length);
  renderCards(currentSpread, cards);
});
</script>
</body>
</html>
