<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tack">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#b8902a">
<title>Tacksamhetsloggbok</title>
<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles.css?v=1">
<style>
  :root{
    --bg-grad:linear-gradient(180deg,#fff5e0 0%,#f5e6c0 100%);
    --line:#ebe0c5;
    --accent:#b8902a;
    --accent-soft:#fbf0d0;
    --accent-dark:#967422;
    --tack:#d4892a;
    --bra:#5a9e4b;
    --hjalp:#5577c2;
  }
  .section-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .dot-tack{background:var(--tack)}
  .dot-bra{background:var(--bra)}
  .dot-hjalp{background:var(--hjalp)}

  .entry-list{display:flex;flex-direction:column;gap:14px}
  .entry-item{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff}
  .entry-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .entry-date{font-weight:700;font-size:15px}
  .entry-spacer{flex:1}
  .entry-actions{display:flex;gap:6px}

  .section-box{
    border-left:4px solid var(--line);
    padding:6px 10px;margin-top:8px;border-radius:0 8px 8px 0;
  }
  .section-box .section-lbl{
    font-size:10px;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;
    margin-bottom:4px;display:flex;align-items:center;gap:6px;
  }
  .section-box .section-txt{font-size:14px;white-space:pre-wrap;color:#3a2f10}
  .section-box.tack{border-color:var(--tack);background:#fef9f0}
  .section-box.tack .section-lbl{color:var(--tack)}
  .section-box.bra{border-color:var(--bra);background:#f5faf3}
  .section-box.bra .section-lbl{color:var(--bra)}
  .section-box.hjalp{border-color:var(--hjalp);background:#f3f6fc}
  .section-box.hjalp .section-lbl{color:var(--hjalp)}
</style>
</head>
<body>

<div class="wrap">

<h1>🙏 Tacksamhetsloggbok</h1>
<p class="subtitle">Tack — bra — hjälp. En kort daglig övning.</p>
<nav data-nav-pills></nav>

<div class="privacy-note">🔒 Inget sparas lokalt — allt går direkt till molnet.</div>

<div class="card">
  <h3 id="formTitle">Ny dag</h3>
  <form id="gratForm" autocomplete="off">
    <div class="field">
      <label>Datum</label>
      <input type="date" id="g_date" required>
    </div>

    <div class="field">
      <label><span class="section-dot dot-tack"></span> Tack — vad är jag tacksam för?</label>
      <textarea id="g_tack" placeholder="T.ex. familjen, en god kopp kaffe, solskenet..." autocomplete="off"></textarea>
    </div>

    <div class="field">
      <label><span class="section-dot dot-bra"></span> Bra — vad gick bra idag?</label>
      <textarea id="g_bra" placeholder="Små segrar, framsteg, lyckade stunder..." autocomplete="off"></textarea>
    </div>

    <div class="field">
      <label><span class="section-dot dot-hjalp"></span> Hjälp — var behöver jag hjälp eller stöd?</label>
      <textarea id="g_hjalp" placeholder="Vad är svårt? Vad skulle jag vilja be om hjälp med?" autocomplete="off"></textarea>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button type="submit" id="saveBtn" class="btn btn-primary">Spara</button>
      <button type="button" id="cancelBtn" class="btn btn-ghost" style="display:none">Avbryt</button>
    </div>
  </form>
  <div class="status" id="status">Ansluter till molnet...</div>
</div>

<div class="card">
  <h3>Tidigare dagar</h3>
  <div class="entry-list" id="entryList"></div>
  <div id="emptyMsg" style="color:var(--muted);font-size:14px;display:none">Inga noteringar än — börja med en tacksam tanke ovan.</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-app'"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-firestore'"></script>
<script src="auth-gate.js?v=9"></script>
<script src="app.js?v=9"></script>
<script>
renderNav("tacksamhet");

const statusEl = document.getElementById("status");
let entries = [];
let db = null;
let editingId = null;

document.getElementById("g_date").valueAsDate = new Date();

function resetForm() {
  editingId = null;
  document.getElementById("formTitle").textContent = "Ny dag";
  document.getElementById("saveBtn").textContent = "Spara";
  document.getElementById("cancelBtn").style.display = "none";
  document.getElementById("gratForm").reset();
  document.getElementById("g_date").valueAsDate = new Date();
}
document.getElementById("cancelBtn").addEventListener("click", resetForm);

document.getElementById("gratForm").addEventListener("submit", e => {
  e.preventDefault();
  if (!db) { alert("Ansluter till molnet, vänta..."); return; }
  const date = document.getElementById("g_date").value;
  const tack = document.getElementById("g_tack").value.trim();
  const bra = document.getElementById("g_bra").value.trim();
  const hjalp = document.getElementById("g_hjalp").value.trim();
  if (!date) { alert("Välj datum"); return; }
  if (!tack && !bra && !hjalp) { alert("Fyll i minst ett fält"); return; }

  const data = { date, tack, bra, hjalp, updatedAt: Date.now() };
  if (!editingId) data.createdAt = Date.now();

  const op = editingId
    ? db.collection("tacksamhet").doc(editingId).set(data, { merge:true })
    : db.collection("tacksamhet").add(data);
  op.then(resetForm).catch(err => alert("Fel: " + err.message));
});

function startEdit(id) {
  const en = entries.find(x => x.id === id);
  if (!en) return;
  editingId = id;
  document.getElementById("formTitle").textContent = "Redigera dag";
  document.getElementById("saveBtn").textContent = "Spara ändringar";
  document.getElementById("cancelBtn").style.display = "";
  document.getElementById("g_date").value = en.date || "";
  document.getElementById("g_tack").value = en.tack || "";
  document.getElementById("g_bra").value = en.bra || "";
  document.getElementById("g_hjalp").value = en.hjalp || "";
  document.getElementById("gratForm").scrollIntoView({ behavior:"smooth", block:"start" });
}

function removeEntry(id) {
  if (!db) return;
  if (!confirm("Ta bort noteringen?")) return;
  db.collection("tacksamhet").doc(id).delete().catch(err => alert("Fel: " + err.message));
}

function render() {
  const list = document.getElementById("entryList");
  list.innerHTML = "";
  const sorted = [...entries].sort((a,b) => (b.date||"").localeCompare(a.date||""));
  document.getElementById("emptyMsg").style.display = sorted.length ? "none" : "";

  sorted.forEach(en => {
    const item = document.createElement("div"); item.className = "entry-item";
    const head = document.createElement("div"); head.className = "entry-head";
    const dateEl = document.createElement("div");
    dateEl.className = "entry-date"; dateEl.textContent = formatDate(en.date);
    const spacer = document.createElement("div"); spacer.className = "entry-spacer";
    const actions = document.createElement("div"); actions.className = "entry-actions";
    const edit = document.createElement("button"); edit.className = "icon-btn"; edit.textContent = "✎"; edit.title="Redigera";
    edit.onclick = () => startEdit(en.id);
    const del = document.createElement("button"); del.className = "icon-btn"; del.textContent = "✕"; del.title="Ta bort";
    del.onclick = () => removeEntry(en.id);
    actions.appendChild(edit); actions.appendChild(del);
    head.appendChild(dateEl); head.appendChild(spacer); head.appendChild(actions);
    item.appendChild(head);

    addSection(item, "tack",  "🙏 Tack",  en.tack);
    addSection(item, "bra",   "✨ Bra",   en.bra);
    addSection(item, "hjalp", "🤝 Hjälp", en.hjalp);

    list.appendChild(item);
  });
}

function addSection(parent, cls, label, text) {
  if (!text) return;
  const b = document.createElement("div"); b.className = "section-box " + cls;
  const l = document.createElement("div"); l.className = "section-lbl"; l.textContent = label;
  const t = document.createElement("div"); t.className = "section-txt"; t.textContent = text;
  b.appendChild(l); b.appendChild(t);
  parent.appendChild(b);
}

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  const days = ["sön","mån","tis","ons","tor","fre","lör"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

initApp(d => {
  db = d;
  db.collection("tacksamhet").onSnapshot(snap => {
    entries = [];
    snap.forEach(doc => entries.push({ id: doc.id, ...doc.data() }));
    statusEl.textContent = entries.length + " noteringar (endast i molnet)";
    render();
  }, err => {
    statusEl.textContent = "Firestore-fel: " + err.message;
  });
}, { memoryCache: true, onError: e => { statusEl.textContent = e.message; } });
</script>

<script src="pwa.js?v=1"></script>
</body>
</html>
