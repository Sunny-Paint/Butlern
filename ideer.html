<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Idéer">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#c97a2b">
<title>Roliga idéer</title>
<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles.css?v=1">
<style>
  :root{
    --accent:#c97a2b;
    --accent-soft:#fbe9d2;
    --accent-dark:#a45f1f;
  }
  form.add{display:flex;flex-direction:column;gap:10px}
  .btn-sm{padding:6px 10px;font-size:12px}

  .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .tag-pill{
    display:inline-flex;align-items:center;gap:4px;
    padding:5px 10px;font-size:12px;font-weight:600;border-radius:999px;
    background:#f5f0e6;color:var(--ink);border:1px solid var(--line);cursor:pointer;
    user-select:none;
  }
  .tag-pill.selected{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .tag-pill.tag-add{background:#fff;border-style:dashed;color:var(--muted)}
  .tag-pill .tag-x{
    display:inline-flex;align-items:center;justify-content:center;
    width:16px;height:16px;border-radius:50%;
    font-size:11px;line-height:1;color:var(--muted);
    background:rgba(0,0,0,.06);margin-left:2px;
    cursor:pointer;transition:background .15s,color .15s;
  }
  .tag-pill .tag-x:hover{background:#c0392b;color:#fff}
  .tag-pill.tag-add .tag-x{display:none}

  .filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px}
  .filter-row .lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-right:4px}

  .idea-list{display:flex;flex-direction:column;gap:14px}
  .idea{
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff;
    transition:border-color .15s, box-shadow .15s;
  }
  .idea:hover{border-color:var(--accent);box-shadow:0 2px 8px color-mix(in srgb, var(--accent) 10%, transparent)}
  .idea-head{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .idea-title{font-size:17px;font-weight:700;color:var(--ink);flex:1;min-width:0;word-break:break-word;margin:0}
  .idea-actions{display:flex;gap:4px}

  .idea-desc{font-size:14px;color:#3a2f10;white-space:pre-wrap;margin:8px 0 6px}
  .idea-tags{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
  .idea-tag{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-weight:600}

  .idea-tasks{margin-top:10px;display:flex;flex-direction:column;gap:6px}
  .idea-task{
    display:flex;align-items:center;gap:8px;font-size:14px;
    padding:6px 8px;border-radius:8px;background:#fafaf6;border:1px solid #efe9d8;
  }
  .idea-task.done{opacity:.6;text-decoration:line-through}
  .idea-task input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer;flex:0 0 auto}
  .idea-task .task-text{flex:1;min-width:0;word-break:break-word}
  .idea-task .icon-btn{padding:2px 6px;font-size:12px}

  .task-add{display:flex;gap:6px;margin-top:6px}
  .task-add input{flex:1;padding:8px 10px;font-size:13px}
  .task-add button{padding:8px 12px;font-size:13px}

  .progress{font-size:12px;color:var(--muted);margin-top:8px}
  .progress-bar{height:6px;background:#f0ead8;border-radius:999px;overflow:hidden;margin-top:4px}
  .progress-bar > div{height:100%;background:var(--accent);transition:width .25s}

  .empty{color:var(--muted);font-size:14px;text-align:center;padding:18px}

  /* === Overview: kategori-brickor === */
  .overview-tiles{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:12px;
  }
  .overview-tile{
    display:flex;flex-direction:column;gap:6px;
    padding:18px 16px;background:#fff;border:1px solid var(--line);border-radius:14px;
    color:var(--ink);text-decoration:none;cursor:pointer;
    transition:border-color .15s, box-shadow .15s, transform .05s;
    box-shadow:0 1px 2px rgba(20,20,20,.03);
  }
  .overview-tile:hover{
    border-color:var(--accent);
    box-shadow:0 4px 14px color-mix(in srgb, var(--accent) 15%, transparent);
    transform:translateY(-1px);
  }
  .overview-tile .tile-name{font-size:16px;font-weight:700;color:var(--ink)}
  .overview-tile .tile-count{font-size:12px;color:var(--muted)}
  .overview-tile.tile-empty .tile-name{color:var(--muted);font-weight:600}
  .overview-tile.tile-untag{border-style:dashed}
  .overview-empty{color:var(--muted);font-size:14px;text-align:center;padding:24px;font-style:italic}

  /* Redigeringsläge för områden */
  .overview-tile{position:relative}
  .tile-actions{
    position:absolute;top:8px;right:8px;display:flex;gap:4px;
  }
  .tile-actions button{
    padding:4px 8px;font-size:14px;line-height:1;
    background:#fff;border:1px solid var(--line);border-radius:6px;cursor:pointer;
  }
  .tile-actions button:hover{border-color:var(--accent)}
  .overview-tile.editing{cursor:default}
  .overview-tile.editing:hover{transform:none}
  .tile-add-new{
    justify-content:center;align-items:center;text-align:center;
    border-style:dashed;
  }
  .tile-add-new .tile-name{color:var(--accent);font-size:15px}
  .edit-toolbar{
    display:flex;justify-content:flex-end;align-items:center;
    margin-top:14px;flex-wrap:wrap;gap:10px;
  }

  /* Filter-rad i låst läge */
  .tag-row-locked .tag-back{background:#fff;color:var(--muted);border-style:dashed}
  .tag-row-locked .tag-back:hover{color:var(--accent);border-color:var(--accent)}

  @media (max-width:720px){
    .idea{padding:12px 14px}
  }
</style>
</head>
<body>

<div class="wrap">

<h1>💡 Roliga idéer</h1>
<p class="subtitle" id="pageSubtitle">Välj område nedan — eller lägg till ett nytt.</p>
<nav data-nav-pills></nav>

<!-- Översikt (visas när ingen ?tag= finns) -->
<div id="overviewMode" style="display:none">
  <div class="card">
    <h3>Områden</h3>
    <div class="overview-tiles" id="overviewTiles"></div>
    <div class="overview-empty" id="overviewEmpty" style="display:none">Inga idéer än. Klicka nedan för att lägga till din första.</div>
    <div class="edit-toolbar">
      <a class="btn btn-primary" href="ideer.html?tag=" style="display:inline-block;text-decoration:none">+ Ny idé (välj område själv)</a>
      <button type="button" class="btn btn-ghost btn-sm" id="editModeBtn">⚙️ Redigera områden</button>
    </div>
  </div>
  <div class="status" id="statusOverview">Ansluter...</div>
</div>

<!-- Detaljvy (visas när ?tag=X finns eller ?tag= tomt) -->
<div id="detailMode" style="display:none">
  <div class="card">
    <h3 id="formTitle">Ny idé</h3>
    <form class="add" id="ideaForm" autocomplete="off">
    <div class="field">
      <label>Titel</label>
      <input type="text" id="i_title" placeholder="T.ex. Lära mig surfa" required>
    </div>
    <div class="field">
      <label>Beskrivning (valfri)</label>
      <textarea id="i_desc" placeholder="Mer detaljer..." rows="6" style="min-height:140px;line-height:1.5"></textarea>
    </div>
    <div class="field">
      <label>Taggar</label>
      <div class="tag-row" id="tagPicker"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button type="submit" id="saveBtn" class="btn btn-primary">Spara idé</button>
      <button type="button" id="cancelBtn" class="btn btn-ghost" style="display:none">Avbryt</button>
    </div>
  </form>
  <div class="status" id="status">Ansluter...</div>
</div>

<div class="card">
  <h3>Mina idéer</h3>
  <div class="filter-row">
    <span class="lbl">Filter:</span>
    <div class="tag-row" id="filterPicker"></div>
  </div>
  <div class="idea-list" id="ideaList"></div>
  <div id="emptyMsg" class="empty" style="display:none">Inga idéer än — lägg till en ovan!</div>
</div>

</div><!-- /#detailMode -->

</div><!-- /.wrap -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-app'"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-firestore'"></script>
<script src="auth-gate.js?v=9"></script>
<script src="app.js?v=7"></script>
<script src="task-list.js?v=10"></script>
<script>
// Idéer: översikt (kategori-brickor) om ingen ?tag=, annars låst detaljvy per område.
const DEFAULT_TAGS = ["Roligt","Arbete","Bra för framtiden","Familj","Resa","Lärande","Hus","Hälsa"];
const UNTAG_KEY = "__utan_omrade__";
const UNTAG_LABEL = "Utan område";

const url = new URL(window.location.href);
const hasTagParam = url.searchParams.has("tag");
const tagParam = url.searchParams.get("tag") || "";

if (hasTagParam) {
  // Detaljläge: initTaskList med (eventuellt) låst tagg
  document.getElementById("detailMode").style.display = "";
  document.getElementById("pageSubtitle").innerHTML =
    tagParam
      ? '<a href="ideer.html" style="color:var(--accent);text-decoration:none">← Alla områden</a> · ' + tagParam
      : '<a href="ideer.html" style="color:var(--accent);text-decoration:none">← Alla områden</a> · Alla idéer';
  initTaskList({
    collection: "ideer",
    navKey: "ideer",
    defaultTags: DEFAULT_TAGS,
    storePrefix: "ideer",
    formTitleNew: "Ny idé",
    formTitleEdit: "Redigera idé",
    saveBtnNew: "Spara idé",
    saveBtnEdit: "Spara ändringar",
    addPlaceholder: "Nytt delmål...",
    confirmRemoveItem: "Ta bort idén?",
    emptyText: "Inga idéer i detta område än — lägg till en ovan!",
    itemsLabel: "idéer",
    lockedTag: tagParam || null,
    lockedTagBackHref: "ideer.html"
  });
} else {
  // Översiktsläge: rendera kategori-brickor med antal
  document.getElementById("overviewMode").style.display = "";
  renderNav("ideer");
  const statusEl = document.getElementById("statusOverview");
  const tilesEl = document.getElementById("overviewTiles");
  const emptyEl = document.getElementById("overviewEmpty");
  const editBtn = document.getElementById("editModeBtn");

  // Kategori-lista sparas i Firestore: settings/ideerCategories { list: string[] }
  // Om dokumentet inte finns används DEFAULT_TAGS.
  let effectiveCats = DEFAULT_TAGS.slice();
  let currentItems = [];
  let editMode = false;
  let dbRef = null;

  function saveCategoryList(list) {
    return dbRef.collection("settings").doc("ideerCategories").set({
      list,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  async function addCategory() {
    const name = (prompt("Namn på nytt område:") || "").trim();
    if (!name) return;
    if (effectiveCats.some(t => t.toLowerCase() === name.toLowerCase())) {
      alert("Området finns redan.");
      return;
    }
    try {
      await saveCategoryList([...effectiveCats, name]);
    } catch (e) {
      alert("Kunde inte spara: " + e.message);
    }
  }

  async function renameCategory(oldName) {
    const newName = (prompt("Nytt namn för \"" + oldName + "\":", oldName) || "").trim();
    if (!newName || newName === oldName) return;
    if (effectiveCats.some(t => t.toLowerCase() === newName.toLowerCase())) {
      alert("Ett område med det namnet finns redan.");
      return;
    }
    try {
      // Uppdatera kategori-listan
      const newList = effectiveCats.map(t => t === oldName ? newName : t);
      if (!newList.includes(newName)) newList.push(newName);
      await saveCategoryList(newList);

      // Byt taggen i alla idéer som använder oldName
      const snap = await dbRef.collection("ideer").where("tags", "array-contains", oldName).get();
      if (!snap.empty) {
        const batch = dbRef.batch();
        snap.forEach(doc => {
          const tags = (doc.data().tags || []).map(t => t === oldName ? newName : t);
          const unique = [...new Set(tags)];
          batch.update(doc.ref, { tags: unique });
        });
        await batch.commit();
      }
    } catch (e) {
      alert("Kunde inte byta namn: " + e.message);
    }
  }

  async function deleteCategory(name) {
    const inUse = currentItems.filter(it => Array.isArray(it.tags) && it.tags.includes(name)).length;
    const warn = inUse > 0
      ? "Ta bort området \"" + name + "\"? " + inUse + " idé(er) förlorar taggen (men behålls)."
      : "Ta bort området \"" + name + "\"?";
    if (!confirm(warn)) return;
    try {
      const newList = effectiveCats.filter(t => t !== name);
      await saveCategoryList(newList);

      if (inUse > 0) {
        const snap = await dbRef.collection("ideer").where("tags", "array-contains", name).get();
        const batch = dbRef.batch();
        snap.forEach(doc => {
          batch.update(doc.ref, { tags: firebase.firestore.FieldValue.arrayRemove(name) });
        });
        await batch.commit();
      }
    } catch (e) {
      alert("Kunde inte ta bort: " + e.message);
    }
  }

  editBtn.onclick = () => {
    editMode = !editMode;
    editBtn.textContent = editMode ? "✓ Klar" : "⚙️ Redigera områden";
    editBtn.classList.toggle("btn-primary", editMode);
    editBtn.classList.toggle("btn-ghost", !editMode);
    render();
  };

  function render() {
    // Räkna per tagg
    const counts = new Map();
    let untagged = 0;
    currentItems.forEach(it => {
      const tags = Array.isArray(it.tags) ? it.tags.filter(t => t && t.trim()) : [];
      if (!tags.length) untagged++;
      tags.forEach(t => counts.set(t, (counts.get(t) || 0) + 1));
    });
    statusEl.textContent = currentItems.length + " idéer";

    // Sortera: effektiv lista först i sin ordning, sen okatalogade taggar som finns i data.
    const seen = new Set();
    const orderedTags = [];
    effectiveCats.forEach(t => { orderedTags.push(t); seen.add(t); });
    [...counts.keys()]
      .filter(t => !seen.has(t))
      .sort((a,b) => a.localeCompare(b, "sv"))
      .forEach(t => orderedTags.push(t));

    tilesEl.innerHTML = "";

    orderedTags.forEach(tag => {
      const n = counts.get(tag) || 0;
      const el = document.createElement(editMode ? "div" : "a");
      el.className = "overview-tile" + (n === 0 ? " tile-empty" : "") + (editMode ? " editing" : "");
      if (!editMode) el.href = "ideer.html?tag=" + encodeURIComponent(tag);

      const name = document.createElement("span");
      name.className = "tile-name";
      name.textContent = tag;
      el.appendChild(name);

      const cnt = document.createElement("span");
      cnt.className = "tile-count";
      cnt.textContent = n === 0 ? "Tom" : n + (n === 1 ? " idé" : " idéer");
      el.appendChild(cnt);

      if (editMode) {
        const acts = document.createElement("div");
        acts.className = "tile-actions";
        const rn = document.createElement("button");
        rn.type = "button";
        rn.title = "Byt namn";
        rn.textContent = "✏️";
        rn.onclick = (e) => { e.stopPropagation(); renameCategory(tag); };
        acts.appendChild(rn);
        const del = document.createElement("button");
        del.type = "button";
        del.title = "Ta bort";
        del.textContent = "🗑";
        del.onclick = (e) => { e.stopPropagation(); deleteCategory(tag); };
        acts.appendChild(del);
        el.appendChild(acts);
      }
      tilesEl.appendChild(el);
    });

    // "Utan område"-kachel (bara i normalt läge)
    if (!editMode && untagged > 0) {
      const a = document.createElement("a");
      a.className = "overview-tile tile-untag";
      a.href = "ideer.html?tag=";
      const name = document.createElement("span");
      name.className = "tile-name";
      name.textContent = UNTAG_LABEL;
      a.appendChild(name);
      const cnt = document.createElement("span");
      cnt.className = "tile-count";
      cnt.textContent = untagged + (untagged === 1 ? " idé utan tagg" : " idéer utan taggar");
      a.appendChild(cnt);
      tilesEl.appendChild(a);
    }

    // "+ Nytt område"-kachel i redigeringsläge
    if (editMode) {
      const add = document.createElement("div");
      add.className = "overview-tile tile-add-new editing";
      const name = document.createElement("span");
      name.className = "tile-name";
      name.textContent = "+ Nytt område";
      add.appendChild(name);
      add.onclick = addCategory;
      tilesEl.appendChild(add);
    }

    emptyEl.style.display = (orderedTags.length || editMode) ? "none" : "";
  }

  initApp(db => {
    dbRef = db;
    db.collection("settings").doc("ideerCategories").onSnapshot(doc => {
      if (doc.exists && Array.isArray(doc.data().list)) {
        effectiveCats = doc.data().list;
      } else {
        effectiveCats = DEFAULT_TAGS.slice();
      }
      render();
    }, err => console.warn("[ideer] settings-fel:", err));

    db.collection("ideer").onSnapshot(snap => {
      currentItems = [];
      snap.forEach(doc => currentItems.push({ id: doc.id, ...doc.data() }));
      render();
    }, err => {
      statusEl.textContent = "Firestore-fel: " + err.message;
    });
  }, { onError: e => { statusEl.textContent = e.message; } });
}
</script>

<script src="pwa.js?v=1"></script>
</body>
</html>
