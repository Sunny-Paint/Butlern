<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mindfulness">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#8a6fb5">
<title>Mindfulness</title>
<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles.css?v=1">
<style>
  :root{
    --accent:#8a6fb5;
    --accent-soft:#ece4f5;
    --accent-dark:#6a4f95;
  }
  .section h3{margin-top:0}
  .entry-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .entry{
    display:flex;align-items:flex-start;gap:10px;
    border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;background:#fff;
  }
  .entry-main{flex:1;min-width:0}
  .entry-title{font-weight:600;color:var(--ink);word-break:break-word}
  .entry-title a{color:var(--accent-dark);text-decoration:none}
  .entry-title a:hover{text-decoration:underline}
  .entry-desc{font-size:13px;color:#3a2f4a;white-space:pre-wrap;margin-top:4px;word-break:break-word;line-height:1.5}
  .entry-desc.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .entry-toggle{background:none;border:none;color:var(--accent-dark);font-size:12px;font-weight:600;cursor:pointer;padding:4px 0 0;text-decoration:underline}
  .entry .icon-btn{padding:4px 8px;font-size:13px}

  .add-entry{display:flex;flex-direction:column;gap:8px;border-top:1px dashed var(--line);padding-top:12px}
  .add-entry input, .add-entry textarea{padding:8px 10px;font-size:14px;font-family:inherit}
  .add-entry textarea{resize:vertical;min-height:80px;line-height:1.5;border:1px solid var(--line);border-radius:8px}
  .add-entry textarea:focus{outline:none;border-color:var(--accent)}
  .add-entry button{align-self:flex-start;padding:8px 14px;font-size:13px}

  /* Underanteckningar */
  .entry-subnotes{margin-top:8px;display:flex;flex-direction:column;gap:4px;border-top:1px dashed var(--line);padding-top:8px}
  .subnote-row{display:flex;align-items:flex-start;gap:6px;font-size:13px;color:#3a2f4a;padding:4px 6px;border-radius:6px;background:#fafaf8;border:1px solid #efebe5}
  .subnote-text{flex:1;min-width:0;word-break:break-word;white-space:pre-wrap;cursor:text}
  .subnote-row .icon-btn{padding:2px 6px;font-size:11px}
  .subnote-add{display:flex;gap:6px;margin-top:2px}
  .subnote-add input{flex:1;padding:6px 8px;font-size:12px;border:1px solid var(--line);border-radius:6px}
  .subnote-add button{padding:6px 10px;font-size:12px}

  /* Datum-badge för services */
  .entry-date{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent-dark);margin-right:6px;white-space:nowrap}
  .entry-date.past{background:#eee;color:var(--muted)}
  .entry-date.today{background:#fef3c7;color:#92400e}

  .empty{color:var(--muted);font-size:13px;text-align:center;padding:14px;font-style:italic}
</style>
</head>
<body>

<div class="wrap">

<h1>🧘 Mindfulness</h1>
<p class="subtitle">Meditationer, andningsövningar, tekniker och länkar — fyll på själv.</p>
<nav data-nav-pills></nav>

<div class="card section" data-cat="service">
  <h3>⛪ Kommande services</h3>
  <div class="entry-list" id="list-service"></div>
  <form class="add-entry">
    <input type="text" name="title" placeholder="Titel (t.ex. Söndagsgudstjänst)" required>
    <input type="date" name="date">
    <textarea name="desc" placeholder="Anteckningar (valfri)" rows="2"></textarea>
    <input type="url" name="url" placeholder="Länk (valfri, https://...)">
    <button type="submit" class="btn btn-primary">+ Lägg till</button>
  </form>
</div>

<div class="card section" data-cat="meditation">
  <h3>🧘‍♀️ Meditationer</h3>
  <div class="entry-list" id="list-meditation"></div>
  <form class="add-entry">
    <input type="text" name="title" placeholder="Titel (t.ex. 10 min kroppsskanning)" required>
    <textarea name="desc" placeholder="Beskrivning (valfri) – använd radbrytningar och blankrader om du vill" rows="3"></textarea>
    <input type="url" name="url" placeholder="Länk (valfri, https://...)">
    <button type="submit" class="btn btn-primary">+ Lägg till</button>
  </form>
</div>

<div class="card section" data-cat="breathing">
  <h3>🌬️ Andningsövningar</h3>
  <div class="entry-list" id="list-breathing"></div>
  <form class="add-entry">
    <input type="text" name="title" placeholder="Titel (t.ex. Box breathing 4-4-4-4)" required>
    <textarea name="desc" placeholder="Beskrivning (valfri) – använd radbrytningar och blankrader om du vill" rows="3"></textarea>
    <input type="url" name="url" placeholder="Länk (valfri, https://...)">
    <button type="submit" class="btn btn-primary">+ Lägg till</button>
  </form>
</div>

<div class="card section" data-cat="technique">
  <h3>🛠️ Tekniker</h3>
  <div class="entry-list" id="list-technique"></div>
  <form class="add-entry">
    <input type="text" name="title" placeholder="Titel (t.ex. 5-4-3-2-1 grounding)" required>
    <textarea name="desc" placeholder="Beskrivning (valfri) – använd radbrytningar och blankrader om du vill" rows="3"></textarea>
    <input type="url" name="url" placeholder="Länk (valfri, https://...)">
    <button type="submit" class="btn btn-primary">+ Lägg till</button>
  </form>
</div>

<div class="card section" data-cat="link">
  <h3>🔗 Länkar / resurser</h3>
  <div class="entry-list" id="list-link"></div>
  <form class="add-entry">
    <input type="text" name="title" placeholder="Titel (t.ex. Insight Timer)" required>
    <textarea name="desc" placeholder="Beskrivning (valfri)" rows="2"></textarea>
    <input type="url" name="url" placeholder="https://..." required>
    <button type="submit" class="btn btn-primary">+ Lägg till</button>
  </form>
</div>

<div class="card section" data-cat="thought">
  <h3>💭 Tankar</h3>
  <div class="entry-list" id="list-thought"></div>
  <form class="add-entry">
    <input type="text" name="title" placeholder="Tanken kort" required>
    <textarea name="desc" placeholder="Utveckla (valfri) – använd radbrytningar och blankrader om du vill" rows="3"></textarea>
    <input type="url" name="url" placeholder="Länk (valfri, https://...)">
    <button type="submit" class="btn btn-primary">+ Lägg till</button>
  </form>
</div>

<div class="status" id="status">Ansluter...</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-app'"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-firestore'"></script>
<script src="auth-gate.js?v=9"></script>
<script src="app.js?v=7"></script>
<script>
renderNav("mindfulness");

const CATEGORIES = [
  { key: "service",    emptyText: "Inga kommande services än." },
  { key: "meditation", emptyText: "Inga meditationer än." },
  { key: "breathing",  emptyText: "Inga andningsövningar än." },
  { key: "technique",  emptyText: "Inga tekniker än." },
  { key: "link",       emptyText: "Inga länkar än." },
  { key: "thought",    emptyText: "Inga tankar än." }
];
const statusEl = document.getElementById("status");
let db = null;
let entries = [];
let editingId = null;

function startEditEntry(item) {
  const form = document.querySelector('.section[data-cat="' + item.category + '"] form.add-entry');
  if (!form) return;
  editingId = item.id;
  form.querySelector('[name="title"]').value = item.title || "";
  form.querySelector('[name="desc"]').value = item.desc || "";
  form.querySelector('[name="url"]').value = item.url || "";
  const dateInp = form.querySelector('[name="date"]');
  if (dateInp) dateInp.value = item.date || "";
  form.querySelector('button[type="submit"]').textContent = "Spara ändringar";
  form.scrollIntoView({ behavior: "smooth", block: "center" });
  form.querySelector('[name="title"]').focus();
}

function formatServiceDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  if (isNaN(dt.getTime())) return d;
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((dt - today) / 86400000);
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  const days   = ["sön","mån","tis","ons","tor","fre","lör"];
  const dm = dt.getDate() + " " + months[dt.getMonth()];
  let label;
  if (diff === 0) label = "Idag";
  else if (diff === 1) label = "Imorgon";
  else if (diff > 1 && diff <= 7) label = days[dt.getDay()] + " " + dm;
  else label = dm + (dt.getFullYear() !== today.getFullYear() ? " " + dt.getFullYear() : "");
  let cls = "";
  if (diff < 0) cls = "past";
  else if (diff === 0) cls = "today";
  return { text: label, cls };
}

function addSubnote(item, text) {
  const t = (text || "").trim();
  if (!t) return;
  const notes = [...(item.notes || []), {
    id: "n_" + Date.now() + "_" + Math.floor(Math.random()*1000),
    text: t
  }];
  db.collection("mindfulness").doc(item.id).update({ notes, updatedAt: Date.now() })
    .catch(err => alert("Fel: " + err.message));
}
function removeSubnote(item, noteId) {
  const notes = (item.notes || []).filter(n => n.id !== noteId);
  db.collection("mindfulness").doc(item.id).update({ notes, updatedAt: Date.now() })
    .catch(err => alert("Fel: " + err.message));
}
function editSubnote(item, noteId, newText) {
  const t = (newText || "").trim();
  if (!t) return;
  const notes = (item.notes || []).map(n => n.id === noteId ? { ...n, text: t } : n);
  db.collection("mindfulness").doc(item.id).update({ notes, updatedAt: Date.now() })
    .catch(err => alert("Fel: " + err.message));
}

function renderAll() {
  CATEGORIES.forEach(cat => {
    const root = document.getElementById("list-" + cat.key);
    if (!root) return;
    root.innerHTML = "";
    let filtered = entries.filter(e => e.category === cat.key);
    if (cat.key === "service") {
      // Kommande först (kronologiskt), sedan poster utan datum, sedan passerade (omvänd)
      const today = new Date(); today.setHours(0,0,0,0);
      const withDate = filtered.filter(e => e.date);
      const noDate   = filtered.filter(e => !e.date)
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      const upcoming = withDate.filter(e => new Date(e.date + "T00:00:00") >= today)
        .sort((a, b) => a.date.localeCompare(b.date));
      const past = withDate.filter(e => new Date(e.date + "T00:00:00") < today)
        .sort((a, b) => b.date.localeCompare(a.date));
      filtered = [...upcoming, ...noDate, ...past];
    } else {
      filtered = filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }
    if (!filtered.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = cat.emptyText;
      root.appendChild(empty);
      return;
    }
    filtered.forEach(item => {
      const row = document.createElement("div");
      row.className = "entry";

      const main = document.createElement("div");
      main.className = "entry-main";
      const title = document.createElement("div");
      title.className = "entry-title";
      if (item.category === "service" && item.date) {
        const d = formatServiceDate(item.date);
        if (d) {
          const b = document.createElement("span");
          b.className = "entry-date" + (d.cls ? " " + d.cls : "");
          b.textContent = d.text;
          title.appendChild(b);
        }
      }
      if (item.url) {
        const a = document.createElement("a");
        a.href = item.url; a.target = "_blank"; a.rel = "noopener";
        a.textContent = item.title || item.url;
        title.appendChild(a);
      } else {
        title.appendChild(document.createTextNode(item.title || "(utan titel)"));
      }
      main.appendChild(title);
      if (item.desc) {
        const desc = document.createElement("div");
        desc.className = "entry-desc";
        desc.textContent = item.desc;
        const isLong = (item.desc.match(/\n/g) || []).length >= 4 || item.desc.length > 220;
        if (isLong) {
          desc.classList.add("collapsed");
          main.appendChild(desc);
          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = "entry-toggle";
          toggle.textContent = "Visa mer";
          toggle.onclick = () => {
            const collapsed = desc.classList.toggle("collapsed");
            toggle.textContent = collapsed ? "Visa mer" : "Visa mindre";
          };
          main.appendChild(toggle);
        } else {
          main.appendChild(desc);
        }
      }

      // Underanteckningar
      const sub = document.createElement("div");
      sub.className = "entry-subnotes";
      const notes = item.notes || [];
      notes.forEach(n => {
        const nRow = document.createElement("div");
        nRow.className = "subnote-row";
        const nTxt = document.createElement("span");
        nTxt.className = "subnote-text";
        nTxt.textContent = n.text;
        nTxt.title = "Klicka för att redigera";
        nTxt.onclick = () => {
          const v = prompt("Redigera underanteckning:", n.text);
          if (v != null) editSubnote(item, n.id, v);
        };
        nRow.appendChild(nTxt);
        const nDel = document.createElement("button");
        nDel.className = "icon-btn"; nDel.textContent = "✕"; nDel.title = "Ta bort";
        nDel.onclick = () => { if (confirm("Ta bort anteckningen?")) removeSubnote(item, n.id); };
        nRow.appendChild(nDel);
        sub.appendChild(nRow);
      });
      const addNote = document.createElement("form");
      addNote.className = "subnote-add";
      const ni = document.createElement("input");
      ni.type = "text"; ni.placeholder = "Ny underanteckning...";
      const nb = document.createElement("button");
      nb.type = "submit"; nb.className = "btn btn-ghost"; nb.textContent = "+";
      addNote.appendChild(ni); addNote.appendChild(nb);
      addNote.onsubmit = ev => { ev.preventDefault(); addSubnote(item, ni.value); ni.value = ""; };
      sub.appendChild(addNote);
      main.appendChild(sub);

      row.appendChild(main);

      const ed = document.createElement("button");
      ed.className = "icon-btn"; ed.textContent = "✎"; ed.title = "Redigera";
      ed.onclick = () => startEditEntry(item);
      row.appendChild(ed);

      const del = document.createElement("button");
      del.className = "icon-btn"; del.textContent = "✕"; del.title = "Ta bort";
      del.onclick = () => {
        if (!db) return;
        if (!confirm("Ta bort?")) return;
        db.collection("mindfulness").doc(item.id).delete()
          .catch(err => alert("Fel: " + err.message));
      };
      row.appendChild(del);

      root.appendChild(row);
    });
  });
}

document.querySelectorAll(".section form.add-entry").forEach(form => {
  form.addEventListener("submit", e => {
    e.preventDefault();
    if (!db) { alert("Ansluter, vänta..."); return; }
    const cat = form.closest(".section").dataset.cat;
    const title = form.querySelector('[name="title"]').value.trim();
    const desc  = form.querySelector('[name="desc"]').value.trim();
    const url   = form.querySelector('[name="url"]').value.trim();
    const dateInp = form.querySelector('[name="date"]');
    const date  = dateInp ? (dateInp.value || "") : "";
    if (!title && !url) return;
    const data = { category: cat, title, desc, url, updatedAt: Date.now() };
    if (dateInp) data.date = date;
    const onDone = () => {
      form.reset();
      form.querySelector('button[type="submit"]').textContent = "+ Lägg till";
      editingId = null;
    };
    if (editingId) {
      db.collection("mindfulness").doc(editingId).set(data, { merge: true })
        .then(onDone).catch(err => alert("Fel: " + err.message));
    } else {
      data.createdAt = Date.now();
      db.collection("mindfulness").add(data)
        .then(onDone).catch(err => alert("Fel: " + err.message));
    }
  });
});

initApp(d => {
  db = d;
  db.collection("mindfulness").onSnapshot(snap => {
    entries = [];
    snap.forEach(doc => entries.push({ id: doc.id, ...doc.data() }));
    statusEl.textContent = entries.length + " sparade";
    renderAll();
  }, err => {
    statusEl.textContent = "Firestore-fel: " + err.message;
  });
}, { onError: e => { statusEl.textContent = e.message; } });
</script>

<script src="pwa.js?v=1"></script>
</body>
</html>
