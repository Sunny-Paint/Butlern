<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Parkering">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2b6cb0">
<title>Parkering</title>
<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles.css?v=1">
<style>
  :root{
    --bg-grad:linear-gradient(180deg,#fef9ee 0%,#f1e9d6 100%);
    --line:#e6e1d4;
    --accent:#2b6cb0;
    --accent-soft:#e8f0fb;
    --accent-dark:#1f5a99;
  }
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row .field{flex:1 1 220px;min-width:0}

  .results{display:flex;flex-direction:column;gap:8px}
  .result{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}
  .result-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .result-street{font-weight:600;font-size:15px}
  .result-time{font-size:13px;color:var(--accent);font-weight:600;white-space:nowrap}
  .result-meta{font-size:11px;color:var(--muted);margin-top:4px}
  .result-rules{display:flex;flex-direction:column;gap:4px;margin-top:8px}
  .result-rule{display:flex;align-items:baseline;gap:8px;font-size:13px;flex-wrap:wrap;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .1s}
  .result-rule:hover{background:var(--accent-soft)}
  .result-rule.open{background:var(--accent-soft)}
  .result-rule .rt{font-weight:600;color:var(--accent);min-width:90px;white-space:nowrap}
  .result-rule .rd{color:var(--ink)}
  .result-rule .rday{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;min-width:54px}
  .result-rule .chev{margin-left:auto;color:var(--muted);font-size:12px;transition:transform .15s}
  .result-rule.open .chev{transform:rotate(90deg)}
  .rule-details{margin:4px 0 6px 8px;padding:10px 12px;border-left:3px solid var(--accent);background:#fafbfd;border-radius:0 8px 8px 0;font-size:12px;display:none}
  .rule-details.open{display:block}
  .rule-details dl{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;margin:0}
  .rule-details dt{font-weight:600;color:var(--muted);white-space:nowrap}
  .rule-details dd{margin:0;color:var(--ink);word-break:break-word}

  .muted{color:var(--muted);font-size:13px;margin:8px 0}
  .help{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
  .help a{color:var(--accent)}
  .error{color:var(--warn)}

  .car-card{background:linear-gradient(135deg,#eaf2fb,#d6e6f7);border-color:#bcd5ef}
  .car-empty{color:var(--muted);font-style:italic;margin:0 0 12px}
  .car-info{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .car-place{font-size:18px;font-weight:700;color:var(--ink);word-break:break-word}
  .car-deadline{font-size:14px;color:var(--ink)}
  .car-countdown{display:inline-block;margin-top:6px;padding:6px 12px;border-radius:999px;font-weight:700;font-size:14px;background:#fff;border:1px solid var(--line);color:var(--accent)}
  .car-countdown.warn{background:#fff7e0;border-color:#e0c060;color:#8a6d2a}
  .car-countdown.danger{background:#fdecea;border-color:#e0a0a0;color:var(--warn)}
  .car-countdown.expired{background:var(--warn);border-color:var(--warn);color:#fff}
  .car-form-row{display:flex;gap:8px;flex-wrap:wrap}
  .car-form .field{margin-bottom:10px}
</style>
</head>
<body>

<div class="wrap">

<h1>🅿️ Parkering</h1>
<p class="subtitle">Städdagar för boendeparkering i Stockholm.</p>
<nav data-nav-pills></nav>

<div class="card car-card" id="carCard">
  <h3>🚗 Var står bilen?</h3>
  <div id="carDisplay">
    <p class="car-empty" id="carEmpty">Ingen parkering registrerad.</p>
    <div class="car-info" id="carInfo" style="display:none">
      <div class="car-place" id="carPlace"></div>
      <div class="car-deadline" id="carDeadline"></div>
      <div><span class="car-countdown" id="carCountdown"></span></div>
    </div>
    <div class="car-form-row">
      <button type="button" class="btn btn-primary" id="carEditBtn">Uppdatera</button>
      <button type="button" class="btn btn-ghost" id="carClearBtn" style="display:none">Rensa</button>
      <button type="button" class="btn btn-ghost" id="carSearchBtn" style="display:none">Sök städdagar vid bilen</button>
    </div>
  </div>
  <form class="car-form" id="carForm" style="display:none;margin-top:10px" autocomplete="off">
    <div class="field">
      <label for="carPlaceInput">Plats / adress</label>
      <input type="text" id="carPlaceInput" placeholder="T.ex. Skaraborgsgatan 12" required>
    </div>
    <div class="field">
      <label for="carDeadlineInput">Måste flyttas senast</label>
      <input type="datetime-local" id="carDeadlineInput" required>
    </div>
    <div class="field">
      <label for="carNoteInput">Anteckning (valfri)</label>
      <input type="text" id="carNoteInput" placeholder="T.ex. norra sidan, taxa 3">
    </div>
    <div class="car-form-row">
      <button type="submit" class="btn btn-primary">Spara</button>
      <button type="button" class="btn btn-ghost" id="carCancelBtn">Avbryt</button>
    </div>
    <p class="status" id="carStatus"></p>
  </form>
</div>

<div class="card">
  <h3>Sök städdagar (boendeparkering)</h3>
  <form id="searchForm">
    <div class="row" style="margin-bottom:10px">
      <div class="field">
        <label for="fArea">Område</label>
        <input type="text" id="fArea" value="Södermalm" placeholder="T.ex. Södermalm" autocomplete="off">
      </div>
      <div class="field" style="flex:1 1 160px">
        <label for="fDay">Veckodag</label>
        <select id="fDay">
          <option value="today">Idag</option>
          <option value="måndag">Måndag</option>
          <option value="tisdag">Tisdag</option>
          <option value="onsdag">Onsdag</option>
          <option value="torsdag">Torsdag</option>
          <option value="fredag">Fredag</option>
          <option value="lördag">Lördag</option>
          <option value="söndag">Söndag</option>
          <option value="all">Hela veckan</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="field" style="flex:1 1 100%">
        <label for="fStreet">Gata (valfri — visar alla dagar för matchande gator)</label>
        <input type="text" id="fStreet" placeholder="T.ex. Skaraborgsgatan" autocomplete="off">
      </div>
    </div>
    <div class="row">
      <button type="submit" class="btn btn-primary" id="searchBtn">Sök</button>
      <button type="button" class="btn btn-ghost" id="clearCacheBtn">Töm cache</button>
    </div>
    <div class="status" id="status"></div>
  </form>
</div>

<div class="card">
  <h3 id="resultsTitle">Resultat</h3>
  <div class="results" id="results"></div>
  <p class="muted" id="resultsEmpty" style="display:none">Inga föreskrifter för valt datum.</p>
</div>

<div class="card">
  <h3>API-nyckel</h3>
  <p class="help">Tjänsten kräver en gratis nyckel från Open Stockholm. <a href="https://openstreetgs.stockholm.se/Home/Key" target="_blank" rel="noopener">Begär en här</a> (sparas bara på den här enheten).</p>
  <div class="row" style="margin-top:8px">
    <div class="field" style="flex:1 1 100%">
      <label for="fKey">Nyckel</label>
      <input type="password" id="fKey" placeholder="Klistra in din apiKey" autocomplete="off">
    </div>
  </div>
  <div class="row" style="margin-top:8px">
    <button type="button" class="btn btn-primary" id="saveKeyBtn">Spara</button>
    <button type="button" class="btn btn-ghost" id="forgetKeyBtn">Glöm nyckel</button>
  </div>
  <div class="status" id="keyStatus"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="auth-gate.js?v=9"></script>
<script src="app.js?v=9"></script>
<script>
renderNav("parkering");

const KEY_STORE   = "parkering.apiKey";
const AREA_STORE  = "parkering.area";
const CACHE_STORE = "parkering.cache";
const CACHE_TTL_MS = 24 * 60 * 60 * 1000;
const DEFAULT_API_KEY = "bcbfb149-7529-4a0c-a8fc-2a2f90d247e6";
const WEEKDAYS_SV = ["söndag","måndag","tisdag","onsdag","torsdag","fredag","lördag"];

const statusEl    = document.getElementById("status");
const keyStatusEl = document.getElementById("keyStatus");
const resultsEl   = document.getElementById("results");
const resultsEmpty= document.getElementById("resultsEmpty");
const resultsTitle= document.getElementById("resultsTitle");
const fArea = document.getElementById("fArea");
const fDay  = document.getElementById("fDay");
const fStreet = document.getElementById("fStreet");
const fKey  = document.getElementById("fKey");

(function init(){
  try {
    const savedArea = localStorage.getItem(AREA_STORE);
    if (savedArea) fArea.value = savedArea;
    let savedKey = localStorage.getItem(KEY_STORE);
    if (!savedKey && DEFAULT_API_KEY) {
      savedKey = DEFAULT_API_KEY;
      try { localStorage.setItem(KEY_STORE, savedKey); } catch(e) {}
    }
    if (savedKey) { fKey.value = savedKey; keyStatusEl.textContent = "Nyckel sparad ✓"; }
  } catch(e) {}
})();

document.getElementById("saveKeyBtn").onclick = () => {
  const k = fKey.value.trim();
  if (!k) { keyStatusEl.textContent = "Tom nyckel"; return; }
  try { localStorage.setItem(KEY_STORE, k); } catch(e) {}
  keyStatusEl.textContent = "Sparat ✓";
};
document.getElementById("forgetKeyBtn").onclick = () => {
  try { localStorage.removeItem(KEY_STORE); } catch(e) {}
  fKey.value = "";
  keyStatusEl.textContent = "Borttagen";
};

function readCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_STORE) || "{}"); } catch(e) { return {}; }
}
function writeCache(c) {
  try { localStorage.setItem(CACHE_STORE, JSON.stringify(c)); } catch(e) {}
}
document.getElementById("clearCacheBtn").onclick = () => {
  try { localStorage.removeItem(CACHE_STORE); } catch(e) {}
  statusEl.textContent = "Cache rensad";
};

function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cbName = "_pk_cb_" + Date.now() + "_" + Math.floor(Math.random()*1e6);
    const sep = url.includes("?") ? "&" : "?";
    const full = url + sep + "callback=" + cbName;
    let done = false;
    const script = document.createElement("script");
    const cleanup = () => {
      done = true;
      try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    window[cbName] = (data) => { if (done) return; cleanup(); resolve(data); };
    script.onerror = () => { if (done) return; cleanup(); reject(new Error("Nätverksfel eller ogiltig nyckel")); };
    script.src = full;
    document.body.appendChild(script);
    setTimeout(() => { if (!done) { cleanup(); reject(new Error("Timeout (20s)")); } }, 20000);
  });
}

async function getServiceDays(area) {
  const key = (localStorage.getItem(KEY_STORE) || DEFAULT_API_KEY || "").trim();
  if (!key) throw new Error("Ingen API-nyckel sparad");
  const cache = readCache();
  const cached = cache[area.toLowerCase()];
  if (cached && (Date.now() - cached.ts) < CACHE_TTL_MS) {
    return { features: cached.features, fromCache: true };
  }
  const url = "https://openparking.stockholm.se/LTF-Tolken/v1/servicedagar/area/"
            + encodeURIComponent(area)
            + "?outputFormat=json&apiKey=" + encodeURIComponent(key);
  const data = await jsonpFetch(url);
  const features = extractFeatures(data);
  cache[area.toLowerCase()] = { ts: Date.now(), features };
  writeCache(cache);
  return { features, fromCache: false };
}

function extractFeatures(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.features)) return data.features;
  if (Array.isArray(data.foreskrifter)) return data.foreskrifter;
  if (Array.isArray(data.items)) return data.items;
  if (data.type === "FeatureCollection" && Array.isArray(data.features)) return data.features;
  for (const k of Object.keys(data)) if (Array.isArray(data[k])) return data[k];
  return [];
}

function propsOf(f) {
  if (!f) return {};
  if (f.properties && typeof f.properties === "object") return f.properties;
  if (f.attributes && typeof f.attributes === "object") return f.attributes;
  return f;
}
function pick(obj, keys) {
  for (const k of keys) {
    for (const real of Object.keys(obj)) {
      if (real.toLowerCase() === k.toLowerCase() && obj[real] != null && obj[real] !== "") return obj[real];
    }
  }
  return "";
}
function featureInfo(f) {
  const p = propsOf(f);
  return {
    street:   pick(p, ["STREET_NAME","STREET","Street","street","Adress","adress","ADRESS","gatunamn","NAMN","namn","Name","name"]),
    section:  pick(p, ["CITY_DISTRICT","section","Section","stracka","strackbeskrivning","DELSTRACKA","delstracka","sida","SIDA"]),
    district: pick(p, ["PARKING_DISTRICT"]),
    day:      pick(p, ["START_WEEKDAY","WEEKDAY","weekday","Veckodag","veckodag","DAG","dag"]),
    from:     pick(p, ["START_TIME","STARTTIME","starttime","FRAN","fran","tid_fran","TID_FRAN","start","Start"]),
    to:       pick(p, ["END_TIME","ENDTIME","endtime","TILL","till","tid_till","TID_TILL","end","End","slut","Slut"]),
    desc:     pick(p, ["VF_PLATS_TYP","BESKRIVNING","beskrivning","TEXT","text","desc","description"]),
    raw: p
  };
}

function formatTime(v) {
  if (v == null || v === "") return "";
  if (typeof v === "number" || /^\d+$/.test(String(v))) {
    let n = Number(v);
    if (n >= 1440) n = 1440;
    const h = Math.floor(n / 60);
    const m = n % 60;
    return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');
  }
  return String(v);
}

document.getElementById("searchForm").addEventListener("submit", async e => {
  e.preventDefault();
  resultsEl.innerHTML = "";
  resultsEmpty.style.display = "none";
  const area = fArea.value.trim();
  const daySel = fDay.value;
  const streetQ = fStreet.value.trim().toLowerCase();
  if (!area) { statusEl.textContent = "Fyll i område"; return; }
  try { localStorage.setItem(AREA_STORE, area); } catch(e) {}

  let wantDay = null, dayLabel = "";
  if (streetQ) {
    wantDay = null;
    dayLabel = 'gata "' + streetQ + '" · alla dagar';
  } else if (daySel === "today") {
    wantDay = WEEKDAYS_SV[new Date().getDay()];
    dayLabel = "idag (" + wantDay + ")";
  } else if (daySel === "all") {
    wantDay = null; dayLabel = "hela veckan";
  } else {
    wantDay = daySel; dayLabel = daySel;
  }
  statusEl.textContent = "Hämtar data för " + area + "...";

  try {
    const { features, fromCache } = await getServiceDays(area);
    const boendeOnly = features.filter(f => {
      const t = (featureInfo(f).desc || "").toLowerCase();
      if (!t.includes("boende")) return false;
      // Endast personbil — exkludera MC/motorcykel-städdagar
      if (t.includes("motorcyk")) return false;
      if (/\bmc\b/.test(t)) return false;
      return true;
    });
    statusEl.textContent = boendeOnly.length + " boende-föreskrifter (personbil)"
      + (fromCache ? " (cache)" : "") + " · filtrerar...";
    const filtered = boendeOnly.filter(f => {
      const info = featureInfo(f);
      if (streetQ) {
        const s = (info.street || "").toLowerCase();
        if (!s.includes(streetQ)) return false;
      }
      if (!wantDay) return true;
      const day = (info.day || "").toString().toLowerCase();
      return day.includes(wantDay);
    });
    // När en gata söks vill vi alltid visa veckodagar i resultatet (third arg = "all")
    renderResults(filtered, area, dayLabel, !wantDay || !!streetQ);
    statusEl.textContent = filtered.length + " träff(ar) · " + dayLabel
      + " (" + boendeOnly.length + " boende totalt"
      + (fromCache ? ", cache" : "") + ")";
  } catch (err) {
    statusEl.innerHTML = '<span class="error">Fel: ' + escapeHtml(err.message) + '</span>';
  }
});

function renderResults(features, area, dayLabel, all) {
  resultsTitle.textContent = "Boendeparkering – " + area + " · " + dayLabel;
  if (!features.length) { resultsEmpty.style.display = "block"; return; }

  const groups = new Map();
  let skipped = 0;
  for (const f of features) {
    const info = featureInfo(f);
    const street = (info.street || "").trim();
    if (!street) { skipped++; continue; }
    if (!groups.has(street)) groups.set(street, { street, district: info.section, rules: new Map() });
    const grp = groups.get(street);
    const fromT = formatTime(info.from);
    const toT   = formatTime(info.to);
    const day   = all ? (info.day || "") : "";
    const key   = day + "|" + fromT + "-" + toT + "|" + (info.desc || "");
    if (!grp.rules.has(key)) grp.rules.set(key, { day, fromT, toT, desc: info.desc, info, raw: info.raw });
  }

  const sorted = [...groups.values()].sort((a,b) => a.street.localeCompare(b.street, "sv"));
  let totalRules = 0;

  for (const grp of sorted) {
    const rules = [...grp.rules.values()].sort((a,b) => {
      if (a.day !== b.day) return (a.day || "").localeCompare(b.day || "", "sv");
      return (a.fromT || "").localeCompare(b.fromT || "");
    });
    totalRules += rules.length;

    const item = document.createElement("div"); item.className = "result";
    const head = document.createElement("div"); head.className = "result-head";
    const street = document.createElement("div");
    street.className = "result-street"; street.textContent = grp.street;
    head.appendChild(street);
    if (rules.length > 1) {
      const cnt = document.createElement("div");
      cnt.className = "result-time"; cnt.textContent = rules.length + " städdagar";
      head.appendChild(cnt);
    }
    item.appendChild(head);

    if (grp.district) {
      const meta = document.createElement("div");
      meta.className = "result-meta"; meta.textContent = grp.district;
      item.appendChild(meta);
    }

    const rulesEl = document.createElement("div"); rulesEl.className = "result-rules";
    for (const r of rules) {
      const row = document.createElement("div"); row.className = "result-rule";
      row.title = "Klicka för mer info";
      if (r.day) {
        const dEl = document.createElement("span");
        dEl.className = "rday"; dEl.textContent = r.day.slice(0,3);
        row.appendChild(dEl);
      }
      const tEl = document.createElement("span");
      tEl.className = "rt";
      tEl.textContent = (r.fromT && r.toT) ? (r.fromT + "–" + r.toT) : (r.fromT || "");
      row.appendChild(tEl);
      if (r.desc) {
        const descEl = document.createElement("span");
        descEl.className = "rd"; descEl.textContent = r.desc;
        row.appendChild(descEl);
      }
      const chev = document.createElement("span");
      chev.className = "chev"; chev.textContent = "›";
      row.appendChild(chev);
      rulesEl.appendChild(row);

      const details = document.createElement("div");
      details.className = "rule-details";
      details.appendChild(buildRuleDetails(r, grp));
      rulesEl.appendChild(details);

      row.addEventListener("click", () => {
        const isOpen = row.classList.toggle("open");
        details.classList.toggle("open", isOpen);
      });
    }
    item.appendChild(rulesEl);
    resultsEl.appendChild(item);
  }

  if (skipped > 0) {
    const note = document.createElement("div");
    note.className = "muted";
    note.textContent = "(" + skipped + " poster utan gatunamn döldes)";
    resultsEl.appendChild(note);
  }
  resultsTitle.textContent += " · " + sorted.length + " gator, " + totalRules + " städdag" + (totalRules === 1 ? "" : "ar");
}

function buildRuleDetails(r, grp) {
  const dl = document.createElement("dl");
  const fields = [];
  if (r.day)         fields.push(["Veckodag", r.day]);
  if (r.fromT && r.toT) fields.push(["Tid", r.fromT + "–" + r.toT]);
  else if (r.fromT)  fields.push(["Tid", r.fromT]);
  if (r.desc)        fields.push(["Beskrivning", r.desc]);
  if (grp && grp.street)   fields.push(["Gata", grp.street]);
  if (grp && grp.district) fields.push(["Område", grp.district]);
  if (r.info && r.info.section)  fields.push(["Sektion", r.info.section]);
  if (r.info && r.info.district) fields.push(["Parkeringsdistrikt", r.info.district]);

  for (const [k, v] of fields) {
    const dt = document.createElement("dt"); dt.textContent = k;
    const dd = document.createElement("dd"); dd.textContent = v;
    dl.appendChild(dt); dl.appendChild(dd);
  }

  // Rådata-fallback: visa allt annat från properties som inte redan visats
  if (r.raw && typeof r.raw === "object") {
    const shown = new Set(["STREET_NAME","STREET","Street","street","Adress","adress","ADRESS","gatunamn","NAMN","namn","Name","name","CITY_DISTRICT","section","Section","stracka","strackbeskrivning","DELSTRACKA","delstracka","sida","SIDA","PARKING_DISTRICT","START_WEEKDAY","WEEKDAY","weekday","Veckodag","veckodag","DAG","dag","START_TIME","STARTTIME","starttime","FRAN","fran","tid_fran","TID_FRAN","start","Start","END_TIME","ENDTIME","endtime","TILL","till","tid_till","TID_TILL","end","End","slut","Slut","VF_PLATS_TYP","BESKRIVNING","beskrivning","TEXT","text","desc","description"].map(s => s.toLowerCase()));
    const extra = [];
    for (const key of Object.keys(r.raw)) {
      if (shown.has(key.toLowerCase())) continue;
      const v = r.raw[key];
      if (v == null || v === "") continue;
      if (typeof v === "object") continue;
      extra.push([key, String(v)]);
    }
    if (extra.length) {
      const dt = document.createElement("dt"); dt.textContent = "—";
      dt.style.gridColumn = "1 / -1"; dt.style.color = "#bbb"; dt.style.margin = "6px 0 2px";
      dl.appendChild(dt);
      for (const [k, v] of extra) {
        const dtE = document.createElement("dt"); dtE.textContent = k;
        const ddE = document.createElement("dd"); ddE.textContent = v;
        dl.appendChild(dtE); dl.appendChild(ddE);
      }
    }
  }
  return dl;
}

// === Var står bilen? ===
let carDb = null;
let currentCar = null;
let countdownTimer = null;

function initCarTracker(db) {
  carDb = db;
  carDb.collection("parking_now").doc("current").onSnapshot(snap => {
    currentCar = snap.exists ? snap.data() : null;
    renderCar();
  }, err => {
    document.getElementById("carEmpty").textContent = "Kunde inte synka: " + err.message;
  });

  document.getElementById("carEditBtn").onclick = () => openCarForm();
  document.getElementById("carCancelBtn").onclick = () => closeCarForm();
  document.getElementById("carClearBtn").onclick = () => {
    if (!confirm("Rensa parkeringsinfo?")) return;
    carDb.collection("parking_now").doc("current").delete()
      .catch(err => alert("Fel: " + err.message));
  };
  document.getElementById("carSearchBtn").onclick = () => {
    if (!currentCar || !currentCar.place) return;
    fArea.value = currentCar.place.split(",")[0].trim();
    document.getElementById("searchForm").scrollIntoView({ behavior:"smooth", block:"start" });
  };
  document.getElementById("carForm").addEventListener("submit", e => {
    e.preventDefault();
    const place = document.getElementById("carPlaceInput").value.trim();
    const deadlineStr = document.getElementById("carDeadlineInput").value;
    const note = document.getElementById("carNoteInput").value.trim();
    if (!place || !deadlineStr) return;
    const deadline = new Date(deadlineStr).getTime();
    const data = { place, deadline, note, updated: Date.now() };
    carDb.collection("parking_now").doc("current").set(data)
      .then(() => closeCarForm())
      .catch(err => { document.getElementById("carStatus").textContent = "Fel: " + err.message; });
  });
}

function openCarForm() {
  document.getElementById("carForm").style.display = "block";
  document.getElementById("carDisplay").style.display = "none";
  document.getElementById("carPlaceInput").value = currentCar?.place || "";
  document.getElementById("carNoteInput").value  = currentCar?.note  || "";
  const d = new Date(currentCar?.deadline || (Date.now() + 24*60*60*1000));
  const pad = n => String(n).padStart(2,'0');
  document.getElementById("carDeadlineInput").value =
    d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate())
    + "T" + pad(d.getHours()) + ":" + pad(d.getMinutes());
  document.getElementById("carPlaceInput").focus();
}
function closeCarForm() {
  document.getElementById("carForm").style.display = "none";
  document.getElementById("carDisplay").style.display = "block";
  document.getElementById("carStatus").textContent = "";
}

function renderCar() {
  const empty   = document.getElementById("carEmpty");
  const info    = document.getElementById("carInfo");
  const clearBt = document.getElementById("carClearBtn");
  const searchBt= document.getElementById("carSearchBtn");
  if (!currentCar) {
    empty.style.display = ""; info.style.display = "none";
    clearBt.style.display = "none"; searchBt.style.display = "none";
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    return;
  }
  empty.style.display = "none"; info.style.display = "flex";
  clearBt.style.display = ""; searchBt.style.display = "";
  document.getElementById("carPlace").textContent = currentCar.place
    + (currentCar.note ? "  —  " + currentCar.note : "");
  const d = new Date(currentCar.deadline);
  const days = ["sön","mån","tis","ons","tor","fre","lör"];
  const pad = n => String(n).padStart(2,'0');
  document.getElementById("carDeadline").textContent =
    "Flytta senast: " + days[d.getDay()] + " " + d.getDate() + "/" + (d.getMonth()+1)
    + " kl " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  paintCountdown();
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(paintCountdown, 30000);
}

function paintCountdown() {
  if (!currentCar) return;
  const el = document.getElementById("carCountdown");
  const diff = currentCar.deadline - Date.now();
  el.classList.remove("warn","danger","expired");
  if (diff <= 0) {
    const overdueMin = Math.floor(-diff / 60000);
    el.textContent = overdueMin < 60
      ? overdueMin + " min över tiden!"
      : Math.floor(overdueMin / 60) + " tim " + (overdueMin % 60) + " min över tiden!";
    el.classList.add("expired");
    return;
  }
  const totalMin = Math.floor(diff / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  let txt;
  if (h >= 24) {
    const d = Math.floor(h / 24);
    txt = d + " dgr " + (h % 24) + " tim kvar";
  } else if (h > 0) {
    txt = h + " tim " + m + " min kvar";
  } else {
    txt = m + " min kvar";
  }
  el.textContent = txt;
  if (totalMin <= 30) el.classList.add("danger");
  else if (totalMin <= 120) el.classList.add("warn");
}

initApp(d => { initCarTracker(d); });
</script>
