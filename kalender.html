<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Själslig spänst">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#6b8e5a">
<title>Själslig spänst – kalender</title>
<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles.css?v=1">
<style>
  :root{
    --accent:#6b8e5a;
    --accent-soft:#e3eddc;
    --accent-dark:#4f6c42;
  }
  .month-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 14px}
  .month-nav h3{margin:0;font-size:18px;text-transform:capitalize}
  .month-nav button{padding:6px 12px;font-size:14px;background:#fff;border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--ink)}
  .month-nav button:hover{border-color:var(--accent);color:var(--accent)}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-head{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;text-align:center;padding:4px 0}
  .cal-day{
    min-height:80px;border:1px solid var(--line);border-radius:8px;background:#fff;
    padding:4px 6px;cursor:pointer;display:flex;flex-direction:column;gap:2px;
    transition:border-color .15s, box-shadow .15s;
  }
  .cal-day:hover{border-color:var(--accent);box-shadow:0 2px 6px rgba(107,142,90,.15)}
  .cal-day.other{background:#fafaf6;color:var(--muted);opacity:.55}
  .cal-day.today{background:var(--accent-soft);border-color:var(--accent)}
  .cal-day.selected{border-color:var(--accent-dark);box-shadow:0 0 0 2px var(--accent-soft)}
  .cal-day .num{font-size:13px;font-weight:600;color:var(--ink)}
  .cal-day.other .num{color:var(--muted)}
  .cal-day .ev{font-size:11px;line-height:1.2;background:var(--accent);color:#fff;padding:2px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-day .ev .ev-time{font-weight:600;margin-right:3px;opacity:.95}
  .cal-day .ev-more{font-size:10px;color:var(--muted)}

  .day-panel{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px}
  .day-panel h3{margin:0 0 10px;font-size:16px}
  .ev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .ev-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;display:flex;gap:10px;align-items:flex-start}
  .ev-main{flex:1;min-width:0}
  .ev-title{font-weight:600;color:var(--ink);word-break:break-word}
  .ev-title a{color:var(--accent-dark)}
  .ev-time-badge{display:inline-block;background:var(--accent-soft);color:var(--accent-dark);font-size:12px;font-weight:600;padding:1px 7px;border-radius:5px;margin-right:6px;vertical-align:baseline}
  .ev-notes{font-size:13px;color:#2a3a25;white-space:pre-wrap;margin-top:4px;word-break:break-word}
  .ev-card .icon-btn{padding:4px 8px;font-size:13px}

  .add-form{display:flex;flex-direction:column;gap:8px;border-top:1px dashed var(--line);padding-top:12px}
  .add-form input,.add-form textarea{padding:8px 10px;font-size:14px;font-family:inherit;border:1px solid var(--line);border-radius:8px}
  .add-form textarea{resize:vertical;min-height:60px;line-height:1.5}
  .add-form textarea:focus,.add-form input:focus{outline:none;border-color:var(--accent)}
  .add-form button{align-self:flex-start;padding:8px 14px;font-size:13px}

  .empty{color:var(--muted);font-size:13px;text-align:center;padding:14px;font-style:italic}

  /* Kommande lista */
  .upcoming{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .upcoming-item{display:flex;gap:10px;align-items:baseline;padding:6px 8px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer}
  .upcoming-item:hover{border-color:var(--accent)}
  .upcoming-date{font-size:12px;font-weight:600;color:var(--accent-dark);min-width:70px;white-space:nowrap}
  .upcoming-title{flex:1;min-width:0;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  @media (max-width:520px){
    .cal-day{min-height:60px;padding:3px 4px}
    .cal-day .num{font-size:12px}
    .cal-day .ev{font-size:10px;padding:1px 4px}
  }
</style>
</head>
<body>

<div class="wrap">

<h1>🌿 Själslig spänst</h1>
<p class="subtitle">Kalender med events och länkar för det som ger själen kraft.</p>
<nav data-nav-pills></nav>

<div class="card">
  <div class="month-nav">
    <button type="button" id="prevBtn">← Förra</button>
    <h3 id="monthTitle"></h3>
    <button type="button" id="nextBtn">Nästa →</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>

  <div class="day-panel">
    <h3 id="dayTitle">Välj en dag</h3>
    <div class="ev-list" id="dayList"></div>
    <form class="add-form" id="evForm" autocomplete="off">
      <input type="text" name="title" placeholder="Titel (t.ex. Yoga-pass, retreat, samtal)" required>
      <input type="date" name="date" required>
      <input type="time" name="time" placeholder="Tid (valfri)">
      <input type="url" name="url" placeholder="Länk (valfri, https://...)">
      <textarea name="notes" placeholder="Anteckningar (valfri)" rows="2"></textarea>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button type="submit" class="btn btn-primary" id="saveBtn">+ Spara event</button>
        <button type="button" class="btn btn-ghost" id="cancelBtn" style="display:none">Avbryt</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <h3>📅 Kommande events</h3>
  <div class="upcoming" id="upcomingList"></div>
  <div class="empty" id="upcomingEmpty" style="display:none">Inga kommande events. Klicka i kalendern för att lägga till.</div>
</div>

<div class="status" id="status">Ansluter...</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-app'"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"
        onerror="document.getElementById('status').textContent='Kunde inte ladda firebase-firestore'"></script>
<script src="auth-gate.js?v=9"></script>
<script src="app.js?v=7"></script>
<script>
renderNav("kalender");

const SV_MONTHS = ["januari","februari","mars","april","maj","juni","juli","augusti","september","oktober","november","december"];
const SV_WD     = ["mån","tis","ons","tor","fre","lör","sön"]; // måndag-först
const SV_WD_LONG= ["måndag","tisdag","onsdag","torsdag","fredag","lördag","söndag"];
const SV_MON_SHORT = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];

const statusEl = document.getElementById("status");
const monthTitleEl = document.getElementById("monthTitle");
const calGridEl = document.getElementById("calGrid");
const dayTitleEl = document.getElementById("dayTitle");
const dayListEl = document.getElementById("dayList");
const evForm = document.getElementById("evForm");
const saveBtn = document.getElementById("saveBtn");
const cancelBtn = document.getElementById("cancelBtn");
const upcomingListEl = document.getElementById("upcomingList");
const upcomingEmptyEl = document.getElementById("upcomingEmpty");

let db = null;
let events = [];
let editingId = null;
let viewMonth = (() => { const d = new Date(); d.setDate(1); return d; })();
let selectedDate = todayKey();

function todayKey() {
  const d = new Date();
  return iso(d);
}
function iso(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return y + "-" + m + "-" + day;
}

function eventsOn(dateKey) {
  return events.filter(e => e.date === dateKey)
    .sort((a, b) => {
      const ta = a.time || "";
      const tb = b.time || "";
      if (ta !== tb) return ta.localeCompare(tb);
      return (a.createdAt || 0) - (b.createdAt || 0);
    });
}

function renderCalendar() {
  const y = viewMonth.getFullYear();
  const m = viewMonth.getMonth();
  monthTitleEl.textContent = SV_MONTHS[m] + " " + y;
  calGridEl.innerHTML = "";

  // Vecko-rubriker
  SV_WD.forEach(d => {
    const h = document.createElement("div");
    h.className = "cal-head";
    h.textContent = d;
    calGridEl.appendChild(h);
  });

  // Första dagen i månaden, justera till måndag-först
  const first = new Date(y, m, 1);
  const startOffset = (first.getDay() + 6) % 7; // mån=0
  const start = new Date(y, m, 1 - startOffset);

  const todayK = todayKey();
  for (let i = 0; i < 42; i++) {
    const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const k = iso(d);
    const cell = document.createElement("div");
    cell.className = "cal-day";
    if (d.getMonth() !== m) cell.classList.add("other");
    if (k === todayK) cell.classList.add("today");
    if (k === selectedDate) cell.classList.add("selected");
    cell.onclick = () => { selectedDate = k; renderCalendar(); renderDay(); };

    const num = document.createElement("div");
    num.className = "num";
    num.textContent = d.getDate();
    cell.appendChild(num);

    const evs = eventsOn(k);
    evs.slice(0, 3).forEach(ev => {
      const e = document.createElement("div");
      e.className = "ev";
      if (ev.time) {
        const t = document.createElement("span");
        t.className = "ev-time";
        t.textContent = ev.time;
        e.appendChild(t);
        e.appendChild(document.createTextNode(ev.title || "(utan titel)"));
      } else {
        e.textContent = ev.title || "(utan titel)";
      }
      cell.appendChild(e);
    });
    if (evs.length > 3) {
      const more = document.createElement("div");
      more.className = "ev-more";
      more.textContent = "+" + (evs.length - 3) + " till";
      cell.appendChild(more);
    }
    calGridEl.appendChild(cell);
  }
}

function formatSvDate(dateKey) {
  const d = new Date(dateKey + "T00:00:00");
  if (isNaN(d.getTime())) return dateKey;
  return SV_WD_LONG[(d.getDay()+6)%7] + " " + d.getDate() + " " + SV_MON_SHORT[d.getMonth()] + " " + d.getFullYear();
}

function renderDay() {
  dayTitleEl.textContent = formatSvDate(selectedDate);
  dayListEl.innerHTML = "";
  const evs = eventsOn(selectedDate);
  if (!evs.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "Inga events denna dag.";
    dayListEl.appendChild(empty);
  }
  evs.forEach(ev => {
    const card = document.createElement("div");
    card.className = "ev-card";
    const main = document.createElement("div");
    main.className = "ev-main";
    const t = document.createElement("div");
    t.className = "ev-title";
    if (ev.time) {
      const badge = document.createElement("span");
      badge.className = "ev-time-badge";
      badge.textContent = ev.time;
      t.appendChild(badge);
    }
    if (ev.url) {
      const a = document.createElement("a");
      a.href = ev.url; a.target = "_blank"; a.rel = "noopener";
      a.textContent = ev.title || ev.url;
      t.appendChild(a);
    } else {
      t.appendChild(document.createTextNode(ev.title || "(utan titel)"));
    }
    main.appendChild(t);
    if (ev.notes) {
      const n = document.createElement("div");
      n.className = "ev-notes";
      n.textContent = ev.notes;
      main.appendChild(n);
    }
    card.appendChild(main);

    const ed = document.createElement("button");
    ed.className = "icon-btn"; ed.textContent = "✎"; ed.title = "Redigera";
    ed.onclick = () => startEdit(ev);
    card.appendChild(ed);

    const del = document.createElement("button");
    del.className = "icon-btn"; del.textContent = "✕"; del.title = "Ta bort";
    del.onclick = () => {
      if (!db) return;
      if (!confirm("Ta bort eventet?")) return;
      db.collection("kalender").doc(ev.id).delete()
        .catch(err => alert("Fel: " + err.message));
    };
    card.appendChild(del);

    dayListEl.appendChild(card);
  });

  // Fyll i datumet i formuläret om vi inte redigerar
  if (!editingId) {
    evForm.querySelector('[name="date"]').value = selectedDate;
  }
}

function renderUpcoming() {
  const todayK = todayKey();
  const upcoming = events.filter(e => e.date >= todayK)
    .sort((a, b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      const ta = a.time || "", tb = b.time || "";
      if (ta !== tb) return ta.localeCompare(tb);
      return (a.createdAt || 0) - (b.createdAt || 0);
    })
    .slice(0, 12);
  upcomingListEl.innerHTML = "";
  upcomingEmptyEl.style.display = upcoming.length ? "none" : "";
  upcoming.forEach(ev => {
    const row = document.createElement("div");
    row.className = "upcoming-item";
    const d = new Date(ev.date + "T00:00:00");
    const dt = document.createElement("span");
    dt.className = "upcoming-date";
    dt.textContent = d.getDate() + " " + SV_MON_SHORT[d.getMonth()] + (ev.time ? " " + ev.time : "");
    const t = document.createElement("span");
    t.className = "upcoming-title";
    t.textContent = ev.title || "(utan titel)";
    row.appendChild(dt); row.appendChild(t);
    row.onclick = () => {
      selectedDate = ev.date;
      const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
      if (monthStart.getTime() !== viewMonth.getTime()) viewMonth = monthStart;
      renderCalendar();
      renderDay();
      document.querySelector(".day-panel").scrollIntoView({ behavior: "smooth", block: "start" });
    };
    upcomingListEl.appendChild(row);
  });
}

function startEdit(ev) {
  editingId = ev.id;
  evForm.querySelector('[name="title"]').value = ev.title || "";
  evForm.querySelector('[name="date"]').value  = ev.date  || "";
  evForm.querySelector('[name="time"]').value  = ev.time  || "";
  evForm.querySelector('[name="url"]').value   = ev.url   || "";
  evForm.querySelector('[name="notes"]').value = ev.notes || "";
  saveBtn.textContent = "Spara ändringar";
  cancelBtn.style.display = "";
  evForm.scrollIntoView({ behavior: "smooth", block: "center" });
  evForm.querySelector('[name="title"]').focus();
}
function resetForm() {
  editingId = null;
  evForm.reset();
  evForm.querySelector('[name="date"]').value = selectedDate;
  saveBtn.textContent = "+ Spara event";
  cancelBtn.style.display = "none";
}
cancelBtn.onclick = resetForm;

evForm.addEventListener("submit", e => {
  e.preventDefault();
  if (!db) { alert("Ansluter, vänta..."); return; }
  const data = {
    title: evForm.querySelector('[name="title"]').value.trim(),
    date:  evForm.querySelector('[name="date"]').value,
    time:  evForm.querySelector('[name="time"]').value,
    url:   evForm.querySelector('[name="url"]').value.trim(),
    notes: evForm.querySelector('[name="notes"]').value.trim(),
    updatedAt: Date.now()
  };
  if (!data.title || !data.date) return;
  if (editingId) {
    db.collection("kalender").doc(editingId).set(data, { merge: true })
      .then(() => { selectedDate = data.date; resetForm(); }).catch(err => alert("Fel: " + err.message));
  } else {
    data.createdAt = Date.now();
    db.collection("kalender").add(data)
      .then(() => { selectedDate = data.date; resetForm(); }).catch(err => alert("Fel: " + err.message));
  }
});

document.getElementById("prevBtn").onclick = () => {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1);
  renderCalendar();
};
document.getElementById("nextBtn").onclick = () => {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1);
  renderCalendar();
};

renderCalendar();
renderDay();

initApp(d => {
  db = d;
  db.collection("kalender").onSnapshot(snap => {
    events = [];
    snap.forEach(doc => events.push({ id: doc.id, ...doc.data() }));
    statusEl.textContent = events.length + " events";
    renderCalendar();
    renderDay();
    renderUpcoming();
  }, err => {
    statusEl.textContent = "Firestore-fel: " + err.message;
  });
}, { onError: e => { statusEl.textContent = e.message; } });
</script>

<script src="pwa.js?v=1"></script>
</body>
</html>
