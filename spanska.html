<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Spanska">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#c8402c">
<title>Spanska – flashcards</title>
<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="styles.css?v=1">
<style>
  :root{
    --accent:#c8402c;
    --accent-soft:#fde3dd;
    --accent-dark:#8a2416;
  }
  .lvl-badge{display:inline-block;background:var(--accent-soft);color:var(--accent-dark);
    font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.05em;margin-left:8px}

  .cats{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 18px}
  .cats button{
    font-size:12px;padding:6px 12px;border-radius:999px;
    background:#fff;border:1px solid var(--line);color:var(--muted);cursor:pointer;
  }
  .cats button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

  .dir-toggle{
    display:flex;gap:6px;margin:8px 0 14px;
  }
  .dir-toggle button{
    flex:1;
    font-size:13px;padding:9px 12px;border-radius:10px;
    background:#fff;border:1px solid var(--line);color:var(--muted);cursor:pointer;
    font-weight:600;
  }
  .dir-toggle button.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .flip-notice{
    background:var(--accent-soft);color:var(--accent-dark);
    border:1px solid var(--accent);border-radius:10px;
    padding:10px 14px;font-size:13px;text-align:center;font-weight:600;
    margin-bottom:12px;
  }

  .card{
    background:#fff;border:1px solid var(--line);border-radius:18px;
    box-shadow:var(--shadow);
    padding:32px 24px;margin-bottom:16px;min-height:180px;
    display:flex;flex-direction:column;justify-content:center;text-align:center;
  }
  .card .cat{
    font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
    font-weight:600;margin-bottom:12px;
  }
  .card .es{
    font-size:30px;font-weight:700;color:var(--ink);line-height:1.2;word-break:break-word;
  }
  .card .es .art{color:var(--accent);margin-right:6px;font-weight:600}
  .card .sv{
    margin-top:16px;padding:12px 14px;background:#fef7f5;border-radius:10px;
    border:1px dashed var(--line);font-size:20px;font-weight:600;color:var(--ink);
  }
  .card .ex{
    margin-top:10px;font-size:14px;color:#2a2a2a;font-style:italic;
    padding:8px 12px;background:#faf6ec;border-radius:8px;border:1px dashed var(--line);
  }
  .card .ex .ex-sv{display:block;margin-top:4px;font-style:normal;color:var(--muted);font-size:13px}
  .hidden{display:none}

  .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .actions button{font-size:14px;padding:9px 18px}
  .actions .btn-primary{min-width:130px}

  .progress{
    text-align:center;font-size:12px;color:var(--muted);margin-top:14px;
  }
  .empty{
    text-align:center;color:var(--muted);font-style:italic;padding:40px 20px;
  }
</style>
</head>
<body>

<div class="wrap">

<h1>🇪🇸 Spanska <span class="lvl-badge">A2 · B1</span></h1>
<p class="subtitle">Flashcards med vanliga ord och fraser. Välj riktning och klicka för att vända kortet.</p>
<nav data-nav-pills></nav>

<div class="dir-toggle" id="dirToggle"></div>

<div class="cats" id="cats"></div>

<div id="flipNotice"></div>
<div id="cardWrap"></div>

<div class="actions">
  <button type="button" class="btn btn-ghost" id="revealBtn">Visa svar</button>
  <button type="button" class="btn btn-primary" id="nextBtn">Nästa kort →</button>
</div>

<div class="progress" id="progress"></div>

</div>

<script src="app.js?v=8"></script>
<script>
renderNav("spanska");

  { c:"uttryck", es:"Más o menos", sv:"Mer eller mindre" },
  { c:"uttryck", es:"Tener ganas de", sv:"Ha lust att", ex_es:"Tengo ganas de viajar.", ex_sv:"Jag har lust att resa." },

];

// UI-state
const catsEl = document.getElementById("cats");
const dirEl = document.getElementById("dirToggle");
const cardWrap = document.getElementById("cardWrap");
const flipEl = document.getElementById("flipNotice");
const revealBtn = document.getElementById("revealBtn");
const nextBtn = document.getElementById("nextBtn");
const progressEl = document.getElementById("progress");

const CAT_ORDER = ["alla","hälsning","frågeord","konversation","mat","resa","familj","vardag","väder","känslor","verb","adjektiv","uttryck"];
const CAT_LABEL = {
  alla:"Alla", hälsning:"Hälsning", frågeord:"Frågeord", konversation:"Konversation",
  mat:"Mat", resa:"Resa", familj:"Familj", vardag:"Vardag", väder:"Väder",
  känslor:"Känslor", verb:"Verb", adjektiv:"Adjektiv", uttryck:"Uttryck"
};

const LS_CAT = "spanska.category";
const LS_DIR = "spanska.direction";
let activeCat = localStorage.getItem(LS_CAT) || "alla";
let direction = localStorage.getItem(LS_DIR) || "es-sv"; // "es-sv" eller "sv-es"
let deck = [];
let idx = -1;

function renderDirToggle() {
  dirEl.innerHTML = "";
  [
    { key:"es-sv", label:"🇪🇸 Spanska → Svenska" },
    { key:"sv-es", label:"🇸🇪 Svenska → Spanska" }
  ].forEach(d => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = d.label;
    if (d.key === direction) btn.classList.add("active");
    btn.onclick = () => {
      if (direction === d.key) return;
      direction = d.key;
      localStorage.setItem(LS_DIR, direction);
      renderDirToggle();
      showFlipNotice("");
      // Vi behåller samma deck och index, bara byter sidor.
      if (deck.length && deck[idx]) renderCard(deck[idx]);
    };
    dirEl.appendChild(btn);
  });
}

function renderCats() {
  catsEl.innerHTML = "";
  CAT_ORDER.forEach(cat => {
    const count = cat === "alla" ? CARDS.length : CARDS.filter(c => c.c === cat).length;
    if (count === 0 && cat !== "alla") return;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = CAT_LABEL[cat] + " (" + count + ")";
    if (cat === activeCat) btn.classList.add("active");
    btn.onclick = () => {
      activeCat = cat;
      localStorage.setItem(LS_CAT, cat);
      renderCats();
      buildDeck();
      showFlipNotice("");
      showNext();
    };
    catsEl.appendChild(btn);
  });
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  const filtered = activeCat === "alla" ? CARDS : CARDS.filter(c => c.c === activeCat);
  deck = shuffle(filtered);
  idx = -1;
}

function showFlipNotice(msg) {
  flipEl.innerHTML = "";
  if (!msg) return;
  const div = document.createElement("div");
  div.className = "flip-notice";
  div.textContent = msg;
  flipEl.appendChild(div);
}

function renderCard(card) {
  cardWrap.innerHTML = "";
  if (!card) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "Inga kort i denna kategori.";
    cardWrap.appendChild(empty);
    return;
  }
  const box = document.createElement("div");
  box.className = "card";

  const cat = document.createElement("div");
  cat.className = "cat";
  cat.textContent = CAT_LABEL[card.c] || card.c;
  box.appendChild(cat);

  // Front/back baserat på riktning
  const frontTxt = direction === "es-sv" ? card.es : card.sv;
  const backTxt  = direction === "es-sv" ? card.sv : card.es;

  const front = document.createElement("div");
  front.className = "es";
  front.textContent = frontTxt;
  box.appendChild(front);

  const back = document.createElement("div");
  back.className = "sv hidden";
  back.id = "svAnswer";
  back.textContent = backTxt;
  box.appendChild(back);

  if (card.ex_es) {
    const ex = document.createElement("div");
    ex.className = "ex hidden";
    ex.id = "exAnswer";
    const exFront = direction === "es-sv" ? card.ex_es : card.ex_sv;
    const exBack  = direction === "es-sv" ? card.ex_sv : card.ex_es;
    ex.textContent = "„" + exFront + "”";
    if (exBack) {
      const sub = document.createElement("span");
      sub.className = "ex-sv";
      sub.textContent = exBack;
      ex.appendChild(sub);
    }
    box.appendChild(ex);
  }

  cardWrap.appendChild(box);

  revealBtn.textContent = "Visa svar";
  revealBtn.disabled = false;
}

function showNext() {
  if (!deck.length) {
    renderCard(null);
    progressEl.textContent = "";
    return;
  }
  idx++;
  if (idx >= deck.length) {
    // Kortleken slut: vänd riktning automatiskt och blanda om.
    direction = direction === "es-sv" ? "sv-es" : "es-sv";
    localStorage.setItem(LS_DIR, direction);
    renderDirToggle();
    showFlipNotice(direction === "sv-es"
      ? "Bra! Nu kör vi samma ord från Svenska → Spanska."
      : "Bra! Nu kör vi samma ord från Spanska → Svenska.");
    buildDeck();
    idx = 0;
  } else {
    // rensa notice när man går vidare från första kortet efter vridning
    if (idx > 0) showFlipNotice("");
  }
  renderCard(deck[idx]);
  progressEl.textContent = "Kort " + (idx + 1) + " / " + deck.length;
}

revealBtn.onclick = () => {
  const sv = document.getElementById("svAnswer");
  const ex = document.getElementById("exAnswer");
  if (sv) sv.classList.remove("hidden");
  if (ex) ex.classList.remove("hidden");
  revealBtn.textContent = "✓ Visat";
  revealBtn.disabled = true;
};
nextBtn.onclick = showNext;

renderDirToggle();
renderCats();
buildDeck();
showNext();
</script>

<script src="pwa.js?v=1"></script>
</body>
</html>
