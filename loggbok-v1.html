<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min loggbok (BACKUP v1)</title>

<style>
:root{
  --bg-grad:linear-gradient(180deg,#fef9ee 0%,#f1e9d6 100%);
  --card:#ffffff;
  --ink:#2b2d33;
  --muted:#7a7e87;
  --line:#e6e1d4;
  --accent:#7a4fb0;
  --accent-soft:#f0e8fb;
  --warn:#c0392b;
  --shadow:0 1px 2px rgba(20,20,20,.04), 0 4px 16px rgba(20,20,20,.06);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg-grad);
  color:var(--ink);
  line-height:1.4;
  padding:24px 16px 80px;
  min-height:100vh;
}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:32px;font-weight:700;letter-spacing:-0.02em;margin:0 0 4px}
.subtitle{color:var(--muted);font-size:14px;margin:0 0 24px}
.subtitle a{color:var(--accent);text-decoration:none}
.subtitle a:hover{text-decoration:underline}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}
.card h2,.card h3{margin-top:0}

form.diary{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);font-weight:600}
input[type=date],input[type=text],input[type=number],textarea,select{
  padding:10px 12px;font-size:14px;border:1px solid var(--line);border-radius:10px;
  background:#fff;font-family:inherit;color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea{resize:vertical;min-height:80px}

.mood-row{display:flex;gap:10px;flex-wrap:wrap}
.mood-option{
  flex:1 1 auto;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 8px;border:2px solid var(--line);border-radius:12px;background:#fff;
  cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;min-width:60px;
}
.mood-option:hover{border-color:var(--accent-soft);background:#fafafa}
.mood-option.selected{border-color:var(--accent);background:var(--accent-soft);color:var(--ink);font-weight:600}
.mood-option .emoji{font-size:28px;line-height:1}

.scale-row{display:flex;align-items:center;gap:10px}
.scale-row input[type=range]{flex:1;accent-color:var(--accent)}
.scale-row .scale-val{min-width:32px;text-align:center;font-weight:700;background:var(--accent-soft);border-radius:8px;padding:4px 8px}

.btn{padding:10px 18px;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:transform .05s, background .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#603d8c}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn-ghost:hover{background:#f5f3ee}

.status{font-size:12px;color:var(--muted);margin-top:10px}

.entry-list{display:flex;flex-direction:column;gap:14px}
.entry-item{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff}
.entry-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.entry-date{font-weight:700;font-size:15px}
.entry-mood{font-size:24px;line-height:1}
.entry-spacer{flex:1}
.entry-stats{display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap;margin-bottom:8px}
.entry-stats span b{color:var(--ink);font-weight:700}
.entry-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.entry-tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-weight:600}
.entry-note{font-size:14px;white-space:pre-wrap;color:#3a2f10}
.entry-actions{display:flex;gap:6px;margin-left:auto}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:4px 8px;border-radius:6px;color:var(--muted)}
.icon-btn:hover{background:#f5f3ee;color:var(--ink)}

@media (max-width:720px){
  body{padding:12px 8px 60px}
  h1{font-size:24px}
  .card{padding:14px}
  .mood-option{flex:1 1 18%;padding:10px 4px;font-size:11px;min-width:50px}
  .mood-option .emoji{font-size:24px}
}
</style>
</head>
<body>

<div class="wrap">

<h1>📓 Min loggbok <span style="font-size:12px;background:#eee;color:#666;padding:2px 8px;border-radius:6px;vertical-align:middle">BACKUP v1</span></h1>
<p class="subtitle"><a href="butlern.html">← Tillbaka till kalendern</a> · <a href="loggbok.html">→ Nya loggboken</a></p>

<div class="card">
  <h3 id="formTitle">Ny loggboksanteckning</h3>
  <form class="diary" id="diaryForm">
    <div class="field"><label>Datum</label><input type="date" id="d_date" required></div>
    <div class="field">
      <label>Hur mår du?</label>
      <div class="mood-row" id="moodRow">
        <div class="mood-option" data-mood="1"><span class="emoji">😞</span>Dålig</div>
        <div class="mood-option" data-mood="2"><span class="emoji">😕</span>Trött</div>
        <div class="mood-option" data-mood="3"><span class="emoji">😐</span>Okej</div>
        <div class="mood-option" data-mood="4"><span class="emoji">🙂</span>Bra</div>
        <div class="mood-option" data-mood="5"><span class="emoji">😄</span>Toppen</div>
      </div>
    </div>
    <div class="field">
      <label>Energi (1–10)</label>
      <div class="scale-row">
        <input type="range" id="d_energy" min="1" max="10" value="5">
        <span class="scale-val" id="energyVal">5</span>
      </div>
    </div>
    <div class="field"><label>Sömn (timmar)</label><input type="number" id="d_sleep" min="0" max="24" step="0.5" placeholder="t.ex. 7.5"></div>
    <div class="field"><label>Taggar (komma-separerade)</label><input type="text" id="d_tags" placeholder="träning, jobb, familj..."></div>
    <div class="field"><label>Anteckning</label><textarea id="d_note" placeholder="Vad hände idag? Hur kändes det?"></textarea></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button type="submit" id="saveBtn" class="btn btn-primary">Spara</button>
      <button type="button" id="cancelBtn" class="btn btn-ghost" style="display:none">Avbryt</button>
    </div>
  </form>
  <div class="status" id="status">Laddar...</div>
</div>

<div class="card">
  <h3>Tidigare noteringar</h3>
  <div class="entry-list" id="entryList"></div>
  <div id="emptyMsg" style="color:var(--muted);font-size:14px;display:none">Inga noteringar än — skapa din första ovan!</div>
</div>

</div>

<script>
const statusEl = document.getElementById("status");
const moodLabels = {1:"Dålig",2:"Trött",3:"Okej",4:"Bra",5:"Toppen"};
const moodEmoji  = {1:"😞",2:"😕",3:"😐",4:"🙂",5:"😄"};
let diary = [], db = null, editingId = null, selectedMood = null;

document.getElementById("d_date").valueAsDate = new Date();
document.querySelectorAll(".mood-option").forEach(opt => {
  opt.addEventListener("click", () => {
    document.querySelectorAll(".mood-option").forEach(o => o.classList.remove("selected"));
    opt.classList.add("selected");
    selectedMood = parseInt(opt.dataset.mood, 10);
  });
});
const energyEl = document.getElementById("d_energy");
const energyVal = document.getElementById("energyVal");
energyEl.addEventListener("input", () => energyVal.textContent = energyEl.value);

function resetForm() {
  editingId = null; selectedMood = null;
  document.getElementById("formTitle").textContent = "Ny loggboksanteckning";
  document.getElementById("saveBtn").textContent = "Spara";
  document.getElementById("cancelBtn").style.display = "none";
  document.getElementById("diaryForm").reset();
  document.getElementById("d_date").valueAsDate = new Date();
  document.querySelectorAll(".mood-option").forEach(o => o.classList.remove("selected"));
  energyVal.textContent = "5";
}
document.getElementById("cancelBtn").addEventListener("click", resetForm);

document.getElementById("diaryForm").addEventListener("submit", e => {
  e.preventDefault();
  if (!db) { alert("Ansluter till molnet, vänta..."); return; }
  if (!selectedMood) { alert("Välj humör"); return; }
  const date = document.getElementById("d_date").value;
  const energy = parseInt(energyEl.value, 10);
  const sleepRaw = document.getElementById("d_sleep").value;
  const sleep = sleepRaw === "" ? null : parseFloat(sleepRaw);
  const tags = document.getElementById("d_tags").value.split(",").map(t => t.trim()).filter(Boolean);
  const note = document.getElementById("d_note").value.trim();
  const data = { date, mood:selectedMood, energy, sleep, tags, note, updatedAt:Date.now() };
  if (!editingId) data.createdAt = Date.now();
  const op = editingId
    ? db.collection("dagbok").doc(editingId).set(data, { merge:true })
    : db.collection("dagbok").add(data);
  op.then(resetForm).catch(err => alert("Fel: " + err.message));
});

function startEdit(id) {
  const en = diary.find(x => x.id === id);
  if (!en) return;
  editingId = id;
  document.getElementById("formTitle").textContent = "Redigera notering";
  document.getElementById("saveBtn").textContent = "Spara ändringar";
  document.getElementById("cancelBtn").style.display = "";
  document.getElementById("d_date").value = en.date || "";
  selectedMood = en.mood || null;
  document.querySelectorAll(".mood-option").forEach(o => {
    o.classList.toggle("selected", parseInt(o.dataset.mood,10) === selectedMood);
  });
  energyEl.value = en.energy || 5;
  energyVal.textContent = energyEl.value;
  document.getElementById("d_sleep").value = en.sleep != null ? en.sleep : "";
  document.getElementById("d_tags").value = (en.tags || []).join(", ");
  document.getElementById("d_note").value = en.note || "";
  document.getElementById("diaryForm").scrollIntoView({ behavior:"smooth", block:"start" });
}
function removeEntry(id) {
  if (!db) return;
  if (!confirm("Ta bort noteringen?")) return;
  db.collection("dagbok").doc(id).delete().catch(err => alert("Fel: " + err.message));
}
function render() {
  const list = document.getElementById("entryList");
  list.innerHTML = "";
  const sorted = [...diary].sort((a,b) => (b.date||"").localeCompare(a.date||""));
  document.getElementById("emptyMsg").style.display = sorted.length ? "none" : "";
  sorted.forEach(en => {
    const item = document.createElement("div"); item.className = "entry-item";
    const head = document.createElement("div"); head.className = "entry-head";
    const dateEl = document.createElement("div"); dateEl.className = "entry-date"; dateEl.textContent = formatDate(en.date);
    const moodEl = document.createElement("div"); moodEl.className = "entry-mood"; moodEl.textContent = moodEmoji[en.mood] || "";
    moodEl.title = moodLabels[en.mood] || "";
    const spacer = document.createElement("div"); spacer.className = "entry-spacer";
    const actions = document.createElement("div"); actions.className = "entry-actions";
    const edit = document.createElement("button"); edit.className = "icon-btn"; edit.textContent = "✎"; edit.onclick = () => startEdit(en.id);
    const del = document.createElement("button"); del.className = "icon-btn"; del.textContent = "✕"; del.onclick = () => removeEntry(en.id);
    actions.appendChild(edit); actions.appendChild(del);
    head.appendChild(dateEl); head.appendChild(moodEl); head.appendChild(spacer); head.appendChild(actions);
    item.appendChild(head);
    const stats = document.createElement("div"); stats.className = "entry-stats";
    if (en.energy != null) stats.innerHTML += `<span>Energi <b>${en.energy}/10</b></span>`;
    if (en.sleep != null)  stats.innerHTML += `<span>Sömn <b>${en.sleep} h</b></span>`;
    if (stats.children.length) item.appendChild(stats);
    if (en.tags && en.tags.length) {
      const tags = document.createElement("div"); tags.className = "entry-tags";
      en.tags.forEach(t => { const tag = document.createElement("span"); tag.className = "entry-tag"; tag.textContent = t; tags.appendChild(tag); });
      item.appendChild(tags);
    }
    if (en.note) { const note = document.createElement("div"); note.className = "entry-note"; note.textContent = en.note; item.appendChild(note); }
    list.appendChild(item);
  });
}
function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  const days = ["sön","mån","tis","ons","tor","fre","lör"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="auth-gate.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyA4_OLEPJ6ZU8wB9W3Vzslcc7j1m6jLRdc",
  authDomain: "sommarplanering-d4300.firebaseapp.com",
  projectId: "sommarplanering-d4300",
  storageBucket: "sommarplanering-d4300.firebasestorage.app",
  messagingSenderId: "261517602417",
  appId: "1:261517602417:web:11b754c758c92cc33735d0"
};
function initFirebase(attempt) {
  attempt = attempt || 0;
  if (typeof firebase === "undefined") {
    if (attempt > 50) { statusEl.textContent = "Firebase laddades aldrig"; return; }
    return setTimeout(() => initFirebase(attempt+1), 100);
  }
  try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); db = firebase.firestore(); }
  catch(e) { statusEl.textContent = "Init-fel: " + e.message; return; }
  db.collection("dagbok").onSnapshot(snap => {
    diary = [];
    snap.forEach(d => diary.push({ id:d.id, ...d.data() }));
    statusEl.textContent = diary.length + " noteringar" + (snap.metadata.fromCache ? " (cache)" : "");
    render();
  }, err => { statusEl.textContent = "Firestore-fel: " + err.message; });
}
window.firebaseConfig = firebaseConfig;
requireAuth(() => initFirebase());
</script>

</body>
</html>
